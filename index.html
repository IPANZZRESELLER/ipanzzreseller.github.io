<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Midman Trusted Malaysia</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#000;
  color:#fff;
}

/* SPLASH */
#splash{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

/* 🌈 RAINBOW TITLE */
.logo{
  font-size:26px;
  font-weight:bold;
  background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet,red);
  background-size:400%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:rainbow 4s linear infinite, zoom 1.5s ease;
}

@keyframes rainbow{
  0%{background-position:0%}
  100%{background-position:400%}
}

@keyframes zoom{
  from{transform:scale(0.7);opacity:0}
  to{transform:scale(1);opacity:1}
}

/* HIDE */
.hide{animation:fade 0.8s forwards}
@keyframes fade{to{opacity:0;visibility:hidden}}

/* APP */
#app{display:none}

/* HEADER */
header{
  text-align:center;
  padding:20px;
  font-size:20px;
  font-weight:bold;

  background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet);
  background-size:400%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:rainbow 5s linear infinite;
}

/* CONTAINER */
.container{padding:15px;max-width:500px;margin:auto}

/* SEARCH */
input{
  width:100%;
  padding:12px;
  border-radius:14px;
  border:none;
  background:#111;
  color:#fff;
  margin-bottom:15px;
}

/* TAB */
.tabs{
  display:flex;
  background:#111;
  border-radius:14px;
  padding:4px;
  margin-bottom:15px;
}

.tabs button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  background:transparent;
  color:#aaa;
}

.active{
  background:#00ffcc;
  color:#000;
}

/* CARD */
.card{
  background:#111;
  border-radius:18px;
  padding:15px;
  margin-bottom:12px;
}

/* NAME */
.name{
  font-weight:bold;
  font-size:16px;

  background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet);
  background-size:400%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:rainbow 5s linear infinite;
}

.top{
  text-shadow:0 0 15px gold;
}

/* PHONE */
.phone{color:#aaa;font-size:13px}

/* 🌈 BUTTON FULL */
.btn{
  display:block;
  margin-top:10px;
  padding:10px;
  border-radius:12px;
  text-align:center;
  text-decoration:none;
  font-weight:bold;
  color:#000;

  background:linear-gradient(
    90deg,
    red,orange,yellow,lime,cyan,blue,violet,red
  );
  background-size:400%;
  animation:rainbow 4s linear infinite;

  box-shadow:0 0 15px #00ffcc;
}

/* BOTTOM */
.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#000;
  padding:10px 0;
}

.bottom button{
  background:none;
  border:none;
  color:#aaa;
}

.bottom .active{
  color:#00ffcc;
}
</style>
</head>

<body>

<div id="splash">
  <div class="logo">Midman Trusted Malaysia</div>
</div>

<div id="app">

<header>Midman Trusted Malaysia</header>

<div class="container">

<input id="search" placeholder="Cari...">

<div class="tabs">
  <button onclick="setTab('midman')" id="btnMid" class="active">Midman</button>
  <button onclick="setTab('seller')" id="btnSeller">Seller</button>
  <button onclick="setTab('scam')" id="btnScam">Scam</button>
</div>

<div id="list"></div>

</div>

<div class="bottom">
  <button onclick="setTab('midman')" id="bMid" class="active">⭐</button>
  <button onclick="setTab('seller')" id="bSeller">🛒</button>
  <button onclick="setTab('scam')" id="bScam">⚠️</button>
</div>

</div>

<script>

/* SPLASH */
setTimeout(()=>{
  splash.classList.add("hide");
  app.style.display="block";
},2500);

/* DATA */
let data=[
  {nama:"MID IPANZZ",phone:"60175970694",type:"midman",top:true},
  {nama:"SLRMYAPI",phone:"60104331830",type:"midman"}
];

let currentTab="midman";

/* RENDER */
function render(){
  let html="";
  data.forEach(d=>{
    if(d.type!==currentTab) return;

    html+=`
    <div class="card">
      <div class="name ${d.top?'top':''}">
        ${d.top?'🔥 ':''}${d.nama}
      </div>
      <div class="phone">${d.phone}</div>
      <a class="btn" href="https://wa.me/${d.phone}" target="_blank">
        WhatsApp
      </a>
    </div>`;
  });
  list.innerHTML=html;
}

/* TAB */
function setTab(tab){
  currentTab=tab;

  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".bottom button").forEach(b=>b.classList.remove("active"));

  if(tab==="midman"){btnMid.classList.add("active");bMid.classList.add("active")}
  if(tab==="seller"){btnSeller.classList.add("active");bSeller.classList.add("active")}
  if(tab==="scam"){btnScam.classList.add("active");bScam.classList.add("active")}

  render();
}

/* SEARCH */
search.addEventListener("keyup",function(){
  let v=this.value.toLowerCase();
  document.querySelectorAll(".card").forEach(c=>{
    c.style.display=c.innerText.toLowerCase().includes(v)?"":"none";
  });
});

render();
</script>

</body>
</html>
