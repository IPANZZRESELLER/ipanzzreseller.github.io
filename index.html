<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Midman Trusted Malaysia</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#000;
  color:#fff;
}

/* HEADER */
header{
  text-align:center;
  padding:20px;
  font-weight:bold;
  font-size:20px;
  text-shadow:0 0 10px #00ffcc;
}

/* CONTAINER */
.container{
  max-width:500px;
  margin:auto;
  padding:15px;
  padding-bottom:90px; /* space for bottom bar */
}

/* SEARCH */
input{
  width:100%;
  padding:12px;
  border-radius:14px;
  border:none;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  color:#fff;
  margin-bottom:15px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  border-radius:18px;
  padding:15px;
  margin-bottom:12px;
  transition:0.2s;
}

.card:active{
  transform:scale(0.97);
}

/* TEXT */
.name{
  font-weight:bold;
  color:#00ffcc;
}

.phone{
  font-size:13px;
  color:#aaa;
}

/* BUTTON */
.btn{
  display:block;
  margin-top:10px;
  padding:10px;
  border-radius:12px;
  text-align:center;
  text-decoration:none;
  background:linear-gradient(90deg,#00ffcc,#00aaff);
  color:#000;
  font-weight:bold;
}

/* 🔻 BOTTOM NAV */
.bottom{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(15px);
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  border-top:1px solid rgba(255,255,255,0.1);
}

.bottom button{
  background:none;
  border:none;
  color:#aaa;
  font-size:12px;
  text-align:center;
}

.bottom .active{
  color:#00ffcc;
  text-shadow:0 0 10px #00ffcc;
}
</style>
</head>

<body>

<header>Midman Trusted Malaysia</header>

<div class="container">

<input id="search" placeholder="Cari...">

<div id="list"></div>

</div>

<!-- 🔻 BOTTOM MENU -->
<div class="bottom">
  <button onclick="setTab('home')" id="homeBtn" class="active">🏠<br>Home</button>
  <button onclick="setTab('midman')" id="midBtn">⭐<br>Midman</button>
  <button onclick="setTab('seller')" id="sellerBtn">🛒<br>Seller</button>
  <button onclick="setTab('scam')" id="scamBtn">⚠️<br>Scam</button>
</div>

<script>

let data = [
  {nama:"MID IPANZZ", phone:"60175970694", type:"midman"},
  {nama:"SLRMYAPI", phone:"60104331830", type:"midman"},

  {nama:"SHOP ABC", phone:"60122222222", type:"seller"},

  {nama:"SCAMMER XYZ", phone:"60111111111", type:"scam"}
];

let currentTab = "home";

/* RENDER */
function render(){
  let html="";

  data.forEach(d=>{
    if(currentTab !== "home" && d.type !== currentTab) return;

    html += `
    <div class="card">
      <div class="name">${d.nama}</div>
      <div class="phone">${d.phone}</div>

      <a class="btn" href="https://wa.me/${d.phone}" target="_blank">
        WhatsApp
      </a>
    </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

/* TAB */
function setTab(tab){
  currentTab = tab;

  document.querySelectorAll(".bottom button").forEach(b=>b.classList.remove("active"));

  if(tab==="home") homeBtn.classList.add("active");
  if(tab==="midman") midBtn.classList.add("active");
  if(tab==="seller") sellerBtn.classList.add("active");
  if(tab==="scam") scamBtn.classList.add("active");

  render();
}

/* SEARCH */
document.getElementById("search").addEventListener("keyup", function(){
  let val = this.value.toLowerCase();
  document.querySelectorAll(".card").forEach(card=>{
    card.style.display =
    card.innerText.toLowerCase().includes(val) ? "" : "none";
  });
});

/* START */
render();

</script>

</body>
</html>
