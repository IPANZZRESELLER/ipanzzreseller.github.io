<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Midman Trusted Malaysia</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>
body{background:#0b0b0b;color:#fff;font-family:Arial;margin:0}
.container{max-width:500px;margin:auto;padding:15px}

.card{
  background:#111;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

.avatar{
  width:50px;height:50px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:#00ffc3;color:#000;font-weight:bold;
}

.avatar img{width:100%;height:100%;border-radius:50%}

.btn{
  display:block;margin-top:5px;
  padding:8px;text-align:center;
  background:#25D366;color:#fff;
  border-radius:8px;text-decoration:none;
}

.review{
  background:#1a1a1a;
  padding:5px;
  margin-top:5px;
  border-radius:5px;
  font-size:12px;
}

.badge{font-size:10px;padding:3px 6px;border-radius:5px}
.trusted{background:#00ff99;color:#000}
.scam{background:red}
.warning{background:orange;color:#000}

button{width:100%;padding:8px;margin-top:5px;border-radius:8px}
input{width:100%;padding:10px;border-radius:8px;margin-bottom:10px}
</style>
</head>

<body>

<div class="container">

<h2>Midman Trusted Malaysia</h2>
<p id="stats"></p>

<input id="search" placeholder="Search...">

<div id="adminUI"></div>
<div id="list"></div>

</div>

<script>

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "PASTE",
  authDomain: "PASTE",
  projectId: "PASTE",
  storageBucket: "PASTE"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();
const storage = firebase.storage();

const ADMIN_EMAIL = "EMAIL_KAU";

let isAdmin = false;

/* LOGIN */
auth.onAuthStateChanged(user=>{
  isAdmin = user && user.email === ADMIN_EMAIL;
  renderUI();
});

function renderUI(){
  document.getElementById("adminUI").innerHTML = isAdmin
  ? `<button onclick="addMidman()">+ Tambah</button>
     <button onclick="logout()">Logout</button>`
  : `<button onclick="login()">🔐 Admin</button>`;
}

function login(){
  let email = prompt("Email:");
  let pass = prompt("Password:");
  auth.signInWithEmailAndPassword(email, pass);
}

function logout(){
  auth.signOut();
}

/* AVATAR */
function avatar(nama,img){
  if(img) return `<div class="avatar"><img src="${img}"></div>`;
  return `<div class="avatar">${nama[0]}</div>`;
}

/* LOAD */
db.collection("midman").onSnapshot(snapshot=>{
  let html="";
  document.getElementById("stats").innerText =
  "Total: "+snapshot.size;

  snapshot.forEach(doc=>{
    let d = doc.data();

    html+=`
    <div class="card">
      ${avatar(d.nama,d.img)}

      <b>${d.nama}</b>
      <span class="badge ${d.status}">${d.status||"trusted"}</span>

      <p>⭐ ${d.rating||5}</p>

      <a class="btn" href="https://wa.me/${d.phone}">
      WhatsApp
      </a>

      <button onclick="addReview('${doc.id}')">💬 Review</button>
      <div id="review-${doc.id}"></div>

      ${isAdmin ? `
        <button onclick="edit('${doc.id}','${d.nama}','${d.phone}')">Edit</button>
        <button onclick="del('${doc.id}')">Delete</button>
      `:""}
    </div>
    `;

    loadReview(doc.id);
  });

  document.getElementById("list").innerHTML = html;
});

/* ADD MIDMAN */
function addMidman(){
  let nama = prompt("Nama:");
  let phone = prompt("Phone:");
  let rating = prompt("Rating:");
  let status = prompt("Status (trusted/scam/warning):");

  let input = document.createElement("input");
  input.type="file";

  input.onchange = async e=>{
    let file = e.target.files[0];
    let ref = storage.ref("midman/"+file.name);

    await ref.put(file);
    let url = await ref.getDownloadURL();

    db.collection("midman").add({
      nama, phone, rating, status, img:url
    });
  };

  input.click();
}

/* DELETE */
function del(id){
  db.collection("midman").doc(id).delete();
}

/* EDIT */
function edit(id,nama,phone){
  let n = prompt("Nama:",nama);
  let p = prompt("Phone:",phone);

  db.collection("midman").doc(id).update({nama:n,phone:p});
}

/* REVIEW */
function addReview(midmanId){
  let text = prompt("Review:");
  let rating = prompt("Rating:");

  db.collection("review").add({
    midmanId, text, rating
  });
}

function loadReview(id){
  db.collection("review")
  .where("midmanId","==",id)
  .onSnapshot(snap=>{
    let html="";
    snap.forEach(doc=>{
      let d=doc.data();
      html+=`<div class="review">⭐ ${d.rating} - ${d.text}</div>`;
    });
    document.getElementById("review-"+id).innerHTML = html;
  });
}

/* SEARCH */
document.getElementById("search").addEventListener("keyup", function(){
  let val=this.value.toLowerCase();
  document.querySelectorAll(".card").forEach(card=>{
    card.style.display =
    card.innerText.toLowerCase().includes(val) ? "" : "none";
  });
});

</script>

</body>
</html>
