<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Midman Game UI</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
  overflow:hidden;
}

/* 🌌 STAR BACKGROUND */
canvas{
  position:fixed;
  inset:0;
  z-index:-1;
}

/* HEADER */
header{
  text-align:center;
  padding:15px;
  font-size:20px;
  text-shadow:0 0 15px cyan;
}

/* CARD */
.card{
  background:#111;
  margin:10px;
  padding:15px;
  border-radius:15px;
  box-shadow:0 0 15px #00ffcc44;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05) rotateX(5deg);
  box-shadow:0 0 25px #00ffcc;
}

/* NAME */
.name{
  font-weight:bold;
  background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:rainbow 4s linear infinite;
}

@keyframes rainbow{
  0%{background-position:0%}
  100%{background-position:400%}
}

/* BUTTON */
.btn{
  display:block;
  margin-top:10px;
  padding:10px;
  text-align:center;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
  color:#000;

  background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet);
  background-size:400%;
  animation:rainbow 4s linear infinite, pulse 1s infinite;

  box-shadow:0 0 20px #00ffcc;
}

@keyframes pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.08)}
}

/* CLICK EFFECT */
.spark{
  position:fixed;
  width:10px;
  height:10px;
  background:cyan;
  border-radius:50%;
  pointer-events:none;
  animation:boom 0.5s forwards;
}

@keyframes boom{
  to{
    transform:scale(5);
    opacity:0;
  }
}

/* MUSIC BTN */
.music{
  position:fixed;
  top:10px;
  right:10px;
  background:#111;
  border:1px solid cyan;
  color:cyan;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<header>🎮 Midman Game UI</header>

<button class="music" onclick="toggleMusic()">🎵</button>

<div id="list"></div>

<audio id="bgm" loop>
  <source src="https://files.catbox.moe/3x0u8v.mp3">
</audio>

<audio id="clickSound">
  <source src="https://files.catbox.moe/9f4r3k.mp3">
</audio>

<script>

/* 🌌 STARFIELD */
let c = bg, ctx = c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let stars = Array.from({length:120},()=>({
  x:Math.random()*c.width,
  y:Math.random()*c.height,
  z:Math.random()*2+1
}));

function anim(){
  ctx.clearRect(0,0,c.width,c.height);
  stars.forEach(s=>{
    ctx.fillRect(s.x,s.y,s.z,s.z);
    s.y+=s.z;
    if(s.y>c.height) s.y=0;
  });
  requestAnimationFrame(anim);
}
anim();

/* DATA */
let data=[
  {nama:"MID IPANZZ",phone:"60175970694"},
  {nama:"SLRMYAPI",phone:"60104331830"}
];

function render(){
  list.innerHTML="";
  data.forEach(d=>{
    list.innerHTML+=`
    <div class="card">
      <div class="name">${d.nama}</div>
      <p>${d.phone}</p>
      <a class="btn" href="https://wa.me/${d.phone}" target="_blank">WhatsApp</a>
    </div>`;
  });
}
render();

/* 🎵 MUSIC */
let musicOn=false;
function toggleMusic(){
  let a=bgm;
  if(!musicOn){a.play(); musicOn=true;}
  else{a.pause(); musicOn=false;}
}

/* 🔊 CLICK SOUND + SPARK */
document.addEventListener("click",e=>{
  clickSound.currentTime=0;
  clickSound.play();

  let s=document.createElement("div");
  s.className="spark";
  s.style.left=e.clientX+"px";
  s.style.top=e.clientY+"px";
  document.body.appendChild(s);

  setTimeout(()=>s.remove(),500);
});

</script>

</body>
</html>
