<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Midman Trusted Malaysia</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
}

header{
  text-align:center;
  padding:30px;
}

.container{
  max-width:500px;
  margin:auto;
  padding:15px;
}

.card{
  background:#111;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

.avatar{
  width:50px;
  height:50px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#00ffcc;
  color:#000;
  font-weight:bold;
  margin-bottom:5px;
}

.btn{
  display:block;
  margin-top:5px;
  padding:10px;
  border-radius:8px;
  background:#25D366;
  text-align:center;
  text-decoration:none;
  color:#fff;
}

button{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
}

input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  margin-bottom:10px;
}
</style>
</head>

<body>

<header>
<h2>MIDMAN TRUSTED MALAYSIA</h2>
<p id="date"></p>
</header>

<div class="container">

<input id="search" placeholder="Cari midman...">

<div id="adminUI"></div>
<div id="list"></div>

</div>

<script>

/* CONFIG */
const firebaseConfig = {
  apiKey: "PASTE_APIKEY",
  authDomain: "PASTE_AUTHDOMAIN",
  projectId: "PASTE_PROJECTID"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

/* ADMIN EMAIL */
const ADMIN_EMAIL = "EMAIL_KAU";

/* CHECK LOGIN */
auth.onAuthStateChanged(user=>{
  if(user && user.email === ADMIN_EMAIL){
    showAdmin();
  } else {
    hideAdmin();
  }
});

/* ADMIN UI */
function showAdmin(){
  document.getElementById("adminUI").innerHTML = `
    <button onclick="addMidman()">+ Tambah Midman</button>
    <button onclick="logout()">Logout</button>
  `;
}

function hideAdmin(){
  document.getElementById("adminUI").innerHTML = `
    <button onclick="login()">🔐 Login Admin</button>
  `;
}

/* LOGIN */
function login(){
  let email = prompt("Email:");
  let pass = prompt("Password:");
  auth.signInWithEmailAndPassword(email, pass)
  .catch(()=>alert("Login gagal"));
}

function logout(){
  auth.signOut();
}

/* AVATAR */
function avatar(nama){
  return `<div class="avatar">${nama[0].toUpperCase()}</div>`;
}

/* LOAD DATA */
db.collection("midman").onSnapshot(snapshot=>{
  let html="";

  if(snapshot.empty){
    html = "<p style='text-align:center;color:#888'>Tiada data lagi</p>";
  }

  snapshot.forEach(doc=>{
    let d = doc.data();

    html += `
    <div class="card">
      ${avatar(d.nama)}

      <b>${d.nama}</b><br>
      ${d.phone}<br>
      ⭐ ${d.rating || 5}

      <a class="btn" href="https://wa.me/${d.phone}" target="_blank">
      WhatsApp
      </a>

      ${auth.currentUser && auth.currentUser.email === ADMIN_EMAIL ? `
        <button onclick="deleteMidman('${doc.id}')">Delete</button>
      ` : ""}
    </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
});

/* ADD */
function addMidman(){
  let nama = prompt("Nama:");
  let phone = prompt("Phone (601..):");
  let rating = prompt("Rating:");

  db.collection("midman").add({
    nama,
    phone,
    rating
  });
}

/* DELETE */
function deleteMidman(id){
  db.collection("midman").doc(id).delete();
}

/* SEARCH */
document.getElementById("search").addEventListener("keyup", function(){
  let val = this.value.toLowerCase();
  document.querySelectorAll(".card").forEach(card=>{
    card.style.display =
    card.innerText.toLowerCase().includes(val) ? "" : "none";
  });
});

/* DATE */
document.getElementById("date").innerText =
new Date().toLocaleDateString("ms-MY");

</script>

</body>
</html>
