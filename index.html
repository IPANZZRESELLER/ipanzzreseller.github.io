<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIDMAN TRUSTED MALAYSIA</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0b0b0b;color:#fff}
header{text-align:center;padding:25px}
.profile{width:90px;border-radius:50%;box-shadow:0 0 20px #00ffc3}
.container{max-width:500px;margin:auto;padding:15px}

input{
  width:100%;padding:12px;border-radius:10px;
  border:none;background:#111;color:#fff;margin-bottom:10px;
}

button{
  width:100%;padding:10px;border-radius:10px;
  margin-bottom:10px;border:none;cursor:pointer;
}

.login{border:1px solid #00ffc3;background:#111;color:#00ffc3}
.admin{border:1px solid #d946ef;background:#111;color:#d946ef}
.logout{border:1px solid red;background:#111;color:red}

.midman{
  background:#111;padding:15px;
  border-radius:12px;margin-bottom:10px;
}

.btn{
  display:block;margin-top:10px;
  padding:10px;text-align:center;
  background:linear-gradient(90deg,#d946ef,#3b82f6);
  border-radius:10px;color:#fff;text-decoration:none;
}

.badge{
  background:#00ff99;color:#000;
  font-size:10px;padding:3px 6px;border-radius:5px;
}
</style>
</head>

<body>

<header>
<img src="logo.png" class="profile">
<h2>MIDMAN TRUSTED MALAYSIA</h2>
<p id="date"></p>
</header>

<div class="container">

<input id="search" placeholder="Cari midman...">

<div id="topUI"></div>
<div id="list"></div>

</div>

<script>

/* 🔥 CONFIG (PASTE DARI FIREBASE) */
const firebaseConfig = {
  apiKey: "PASTE",
  authDomain: "PASTE",
  projectId: "PASTE",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

/* 🔐 ADMIN EMAIL (LETak EMAIL KAU) */
const ADMIN_EMAIL = "kau@email.com";

let isAdmin = false;

/* 🔄 CHECK LOGIN */
auth.onAuthStateChanged(user=>{
  if(user && user.email === ADMIN_EMAIL){
    isAdmin = true;
  } else {
    isAdmin = false;
  }
  renderUI();
});

/* UI */
function renderUI(){
  let html = "";

  if(!isAdmin){
    html += `<button class="login" onclick="login()">🔐 Login Admin</button>`;
  } else {
    html += `
      <button class="admin" onclick="addMidman()">+ Tambah</button>
      <button class="logout" onclick="logout()">Logout</button>
    `;
  }

  document.getElementById("topUI").innerHTML = html;
}

/* LOGIN */
function login(){
  let email = prompt("Email:");
  let pass = prompt("Password:");

  auth.signInWithEmailAndPassword(email, pass)
  .catch(()=>alert("Login gagal"));
}

function logout(){
  auth.signOut();
}

/* REALTIME LOAD */
db.collection("midman").onSnapshot(snapshot=>{
  let html = "";

  snapshot.forEach(doc=>{
    let d = doc.data();

    html += `
    <div class="midman">
      <h3>${d.nama} <span class="badge">VERIFIED</span></h3>
      <p>${d.phone}</p>
      <p>⭐ ${d.rating || 5}</p>
      <a class="btn" href="https://wa.me/${d.phone}" target="_blank">WhatsApp</a>

      ${isAdmin ? `
        <button onclick="editMidman('${doc.id}','${d.nama}','${d.phone}','${d.rating}')">Edit</button>
        <button onclick="deleteMidman('${doc.id}')">Delete</button>
      ` : ""}
    </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
});

/* ADD */
function addMidman(){
  let nama = prompt("Nama:");
  let phone = prompt("Phone:");
  let rating = prompt("Rating:");

  db.collection("midman").add({
    nama,
    phone,
    rating
  });
}

/* DELETE */
function deleteMidman(id){
  if(confirm("Padam?")){
    db.collection("midman").doc(id).delete();
  }
}

/* EDIT */
function editMidman(id,nama,phone,rating){
  let n = prompt("Nama:",nama);
  let p = prompt("Phone:",phone);
  let r = prompt("Rating:",rating);

  db.collection("midman").doc(id).update({
    nama:n,
    phone:p,
    rating:r
  });
}

/* SEARCH */
document.getElementById("search").addEventListener("keyup", function(){
  let val = this.value.toLowerCase();
  document.querySelectorAll(".midman").forEach(card=>{
    card.style.display =
    card.innerText.toLowerCase().includes(val) ? "" : "none";
  });
});

/* DATE */
document.getElementById("date").innerText =
new Date().toLocaleDateString("ms-MY");

</script>

</body>
</html>
