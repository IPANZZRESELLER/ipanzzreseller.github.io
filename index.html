<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trusted System</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Orbitron',sans-serif;
background:#000;
color:#fff;
}

/* INTRO */
#splash{
position:fixed;inset:0;
display:flex;justify-content:center;align-items:center;
background:#000;
z-index:999;
}
.line{opacity:0;display:block}
.line.show{animation:fade .6s forwards}
@keyframes fade{to{opacity:1}}

#login{
display:none;
position:fixed;inset:0;
background:#000;
justify-content:center;
align-items:center;
flex-direction:column;
gap:15px;
}

/* BUTTON */
.btnLogin{
padding:12px 20px;
border:1px solid #0ff;
border-radius:10px;
background:#111;
color:#fff;
box-shadow:0 0 10px #0ff;
}

input{
padding:10px;
border-radius:10px;
border:none;
}

/* APP */
#app{display:none}

/* HEADER */
header{
text-align:center;
padding:20px;
text-shadow:0 0 10px #f0f;
}

/* TABS */
.tabs{display:flex;margin:10px;background:#111;border-radius:10px}
.tabs button{flex:1;padding:10px;background:none;border:none;color:#aaa}
.active{color:#fff}

/* CARD */
.card{margin:10px;padding:15px;border-radius:15px}
.midman{box-shadow:0 0 10px #22c55e}
.seller{box-shadow:0 0 10px #3b82f6}
.scam{box-shadow:0 0 10px #ef4444}

/* PROFILE */
.profile{display:flex;gap:10px;cursor:pointer}
.avatar{width:45px;height:45px;border-radius:50%}
.logoSmall{width:18px;height:18px;border-radius:50%}

/* NAME */
.name{
font-weight:700;
text-shadow:0 0 5px #fff,0 0 10px #0ff;
}
.verifyStar{color:gold}

/* BUTTON */
.btn{
display:block;margin-top:10px;padding:10px;text-align:center;
border:1px solid #0ff;
border-radius:10px;
box-shadow:0 0 10px #0ff;
color:#fff;text-decoration:none;
}

.delete{color:red;font-size:12px}
</style>
</head>

<body>

<!-- INTRO -->
<div id="splash">
<div>
<span class="line">Welcome to</span>
<span class="line">Midman / Seller Trusted</span>
<span class="line">& List Scammer</span>
</div>
</div>

<!-- LOGIN -->
<div id="login">
<button class="btnLogin" onclick="userMode()">Masuk sebagai User</button>

<input type="password" id="pass" placeholder="Admin password">
<button class="btnLogin" onclick="adminLogin()">Login Admin</button>
</div>

<!-- APP -->
<div id="app">

<header>Trusted System</header>

<div class="tabs">
<button onclick="setTab('midman')" id="btnMid" class="active">Midman</button>
<button onclick="setTab('seller')" id="btnSeller">Seller</button>
<button onclick="setTab('scam')" id="btnScam">Scam</button>
</div>

<div id="addBox" onclick="addData()" style="display:none;margin:10px;padding:10px;border:1px solid #333;border-radius:10px;text-align:center">
+ Tambah
</div>

<div id="list"></div>

</div>

<script>
let tab="midman";
let isAdmin=false;

let data=[
{
nama:"MID IPANZZ",
phone:"60175970694",
type:"midman",
verified:true,
avatar:"https://i.imgur.com/2DhmtJ4.png",
logo:""
}
];

/* INTRO */
setTimeout(()=>{
document.querySelectorAll(".line").forEach((e,i)=>{
setTimeout(()=>e.classList.add("show"),i*500);
});
setTimeout(()=>{
splash.style.display="none";
login.style.display="flex";
},2000);
},300);

/* LOGIN */
function userMode(){
login.style.display="none";
app.style.display="block";
render();
}

function adminLogin(){
let p=document.getElementById("pass").value;
if(p==="ipanzz"){
isAdmin=true;
login.style.display="none";
app.style.display="block";
document.getElementById("addBox").style.display="block";
render();
}else{
alert("Password salah");
}
}

/* COPY */
function copyWa(num){
let link="https://wa.me/"+num;
navigator.clipboard.writeText(link);
alert("Copied:\n"+link);
}

/* RENDER */
function render(){
let html="";
data.forEach((d,i)=>{
if(d.type!==tab) return;

html+=`
<div class="card ${d.type}">

<div class="profile" onclick="copyWa('${d.phone}')">
<img class="avatar" src="${d.avatar}">
<div>
<div class="name">
${d.nama}
${d.verified?'<span class="verifyStar">★</span>':''}
${d.logo?`<img src="${d.logo}" class="logoSmall">`:''}
</div>
<div>${d.phone}</div>
</div>
</div>

<a class="btn" href="https://wa.me/${d.phone}" target="_blank">WhatsApp</a>

${isAdmin?`<div class="delete" onclick="del(${i})">Delete</div>`:""}

</div>
`;
});
list.innerHTML=html;
}

/* ADD */
function addData(){
let nama=prompt("Nama:");
let phone=prompt("Phone:");
let type=prompt("Type (midman/seller/scam):");
let avatar=prompt("Link gambar:");
let logo=prompt("Logo:");
let verified=confirm("Verified?");

data.push({nama,phone,type,avatar,logo,verified});
render();
}

/* DELETE */
function del(i){
data.splice(i,1);
render();
}

/* TAB */
function setTab(t){
tab=t;
document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
if(t==="midman") btnMid.classList.add("active");
if(t==="seller") btnSeller.classList.add("active");
if(t==="scam") btnScam.classList.add("active");
render();
}
</script>

</body>
</html>
