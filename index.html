<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LIST MIDMAN TRUSTED MALAYSIA</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Orbitron',sans-serif;background:#000;color:#fff}
#splash{position:fixed;inset:0;display:flex;justify-content:center;align-items:center;background:#000;z-index:999}
.typing{
font-size:26px;font-weight:800;
background:linear-gradient(90deg,#ff00ff,#00ffff,#00ff00,#ffff00,#ff0000,#ff00ff);
background-size:400%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:rgb 3s linear infinite;
}
@keyframes rgb{100%{background-position:400%}}
#app{display:none}
header{
text-align:center;padding:25px;font-size:20px;font-weight:800;
background:linear-gradient(90deg,#0ff,#f0f,#0ff);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
animation:rgb 4s linear infinite;
}
.container{max-width:500px;margin:auto;padding:10px}
.tabs{display:flex;background:#111;border-radius:14px;padding:5px;margin-bottom:15px}
.tabs button{flex:1;padding:10px;border:none;background:none;color:#666;font-weight:700}
#btnMid.active{color:#22c55e;text-shadow:0 0 10px #22c55e}
#btnSeller.active{color:#3b82f6;text-shadow:0 0 10px #3b82f6}
#btnScam.active{color:#ef4444;text-shadow:0 0 10px #ef4444}
.card{
padding:2px;border-radius:18px;margin-bottom:15px;
background:linear-gradient(270deg,#ff00ff,#00ffff,#00ff00,#ffff00,#ff0000,#ff00ff);
background-size:600%;
animation:rgb 5s linear infinite;
}
.inner{background:#0f0f0f;border-radius:16px;padding:15px}
.name{font-size:16px;font-weight:800;cursor:pointer}
.phone{font-size:13px;color:#aaa;margin-top:3px}
.verify{
display:inline-block;margin-left:6px;width:16px;height:16px;
border-radius:50%;background:#25D366;color:#fff;
font-size:11px;text-align:center;line-height:16px;
box-shadow:0 0 8px #25D366;
}
.btn{
display:block;margin-top:12px;padding:12px;text-align:center;
border-radius:12px;text-decoration:none;color:#fff;font-weight:700;
background:linear-gradient(90deg,#ff00ff,#00ffff,#ff00ff);
background-size:300%;
animation:rgb 3s linear infinite;
box-shadow:0 0 10px #0ff;
}
</style>
</head>

<body>

<div id="splash">
<div class="typing" id="typing"></div>
</div>

<div id="app">

<header>LIST MIDMAN TRUSTED MALAYSIA</header>

<div class="container">

<div class="tabs">
<button onclick="setTab('midman')" id="btnMid" class="active">Midman</button>
<button onclick="setTab('seller')" id="btnSeller">Seller</button>
<button onclick="setTab('scam')" id="btnScam">Scammer</button>
</div>

<div id="list"></div>

</div>
</div>

<script>
const texts=["WELCOME","LIST MIDMAN TRUSTED","MALAYSIA"];
let i=0,j=0;

function type(){
typing.innerHTML=texts[i].substring(0,j++);
if(j>texts[i].length){
j=0;i++;
if(i>=texts.length){
setTimeout(startApp,800);
return;
}
}
setTimeout(type,70);
}
type();

function startApp(){
splash.style.display="none";
app.style.display="block";
}
setTimeout(startApp,4000);

let data=[

/* MIDMAN */
{nama:"MID IPANZZ",phone:"60175970694",type:"midman",verified:true},

/* SELLER */
{nama:"ZANN RESELLER",phone:"60198393679",type:"seller",verified:true},

/* SCAMMER */
{nama:"MID KIMZ",phone:"60198511351",type:"scam",verified:false}

];

let tab="midman";

function copyWa(num){
navigator.clipboard.writeText("https://wa.me/"+num);
alert("Copied");
}

function render(){
let html="";
data.forEach(d=>{
if(d.type!==tab) return;

html+=`
<div class="card">
<div class="inner">

<div class="name" onclick="copyWa('${d.phone}')">
${d.nama}
${d.verified?'<span class="verify">✔</span>':''}
</div>

<div class="phone">${d.phone}</div>

<a class="btn" href="https://wa.me/${d.phone}" target="_blank">
WhatsApp
</a>

</div>
</div>`;
});
list.innerHTML=html;
}

function setTab(t){
tab=t;
document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));

if(t==="midman") btnMid.classList.add("active");
if(t==="seller") btnSeller.classList.add("active");
if(t==="scam") btnScam.classList.add("active");

render();
}

render();
</script>

</body>
</html>
