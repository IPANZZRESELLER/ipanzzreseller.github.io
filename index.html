<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trusted Midman List</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:#fff;
}

header{
  text-align:center;
  padding:20px;
}

.container{
  max-width:500px;
  margin:auto;
  padding:10px;
}

.tabs{
  display:flex;
  background:#111;
  border-radius:10px;
  padding:5px;
  margin-bottom:10px;
}

.tabs button{
  flex:1;
  padding:10px;
  border:none;
  background:none;
  color:#aaa;
  border-radius:8px;
}

.active{
  background:#d946ef;
  color:#fff;
}

.card{
  background:#111;
  border-radius:12px;
  padding:15px;
  margin-bottom:10px;
  border:1px solid #222;
}

.name{
  font-weight:bold;
}

.phone{
  font-size:13px;
  color:#aaa;
}

.btn{
  display:block;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  background:#d946ef;
  text-align:center;
  color:#fff;
  text-decoration:none;
}

.admin{
  text-align:center;
  padding:10px;
  margin-bottom:10px;
  border:1px solid #333;
  border-radius:10px;
}
</style>
</head>

<body>

<header>
<h2>Trusted Midman List</h2>
</header>

<div class="container">

<div class="tabs">
  <button onclick="setTab('midman')" id="btnMid" class="active">Midman</button>
  <button onclick="setTab('seller')" id="btnSeller">Seller</button>
  <button onclick="setTab('scam')" id="btnScam">Scam</button>
</div>

<div class="admin" onclick="addData()">+ Tambah</div>

<div id="list"></div>

</div>

<script>

/* LOAD DATA */
let data = JSON.parse(localStorage.getItem("trustedData")) || [
  {nama:"MID IPANZZ", phone:"60175970694", type:"midman"}
];

let currentTab="midman";

/* SAVE */
function save(){
  localStorage.setItem("trustedData", JSON.stringify(data));
}

/* RENDER */
function render(){
  let html="";

  data.forEach(d=>{
    if(d.type !== currentTab) return;

    html += `
    <div class="card">
      <div class="name">${d.nama}</div>
      <div class="phone">${d.phone}</div>
      <a class="btn" href="https://wa.me/${d.phone}" target="_blank">
        WhatsApp
      </a>
    </div>`;
  });

  document.getElementById("list").innerHTML = html;
}

/* TAB */
function setTab(tab){
  currentTab = tab;

  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));

  if(tab==="midman") btnMid.classList.add("active");
  if(tab==="seller") btnSeller.classList.add("active");
  if(tab==="scam") btnScam.classList.add("active");

  render();
}

/* ADD */
function addData(){
  let pass = prompt("Password:");
  if(pass !== "ipanzz") return alert("Salah");

  let nama = prompt("Nama:");
  let phone = prompt("Phone:");
  let type = prompt("Type (midman/seller/scam):");

  data.push({nama,phone,type});
  save();
  render();
}

/* START */
render();

</script>

</body>
</html>
