<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Midman Trusted Malaysia</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
}

/* HEADER */
header{
  padding:20px;
}

.sub{color:#888;font-size:13px}

/* CONTAINER */
.container{
  max-width:500px;
  margin:auto;
  padding:15px;
}

/* SEARCH */
input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#111;
  color:#fff;
  margin-bottom:10px;
}

/* TAB */
.tabs{
  display:flex;
  gap:5px;
  margin-bottom:10px;
}

.tabs button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#111;
  color:#fff;
}

.active{
  background:#00ff99;
  color:#000;
}

/* CARD */
.card{
  background:#111;
  border-radius:12px;
  padding:15px;
  margin-bottom:10px;
}

/* 🔥 HIGHLIGHT TEXT */
.glow{
  color:#00ff99;
  text-shadow:0 0 5px #00ff99,
              0 0 10px #00ff99,
              0 0 20px #00ff99;
}

.glow-blue{
  color:#00ccff;
  text-shadow:0 0 5px #00ccff,
              0 0 10px #00ccff;
}

.glow-red{
  color:#ff3b3b;
  text-shadow:0 0 5px #ff3b3b,
              0 0 10px #ff3b3b;
}

/* BUTTON */
.btn{
  display:block;
  margin-top:8px;
  padding:10px;
  border-radius:8px;
  text-align:center;
  text-decoration:none;
  background:#25D366;
  color:#fff;
}
</style>
</head>

<body>

<header>
<h2 class="glow">Midman Trusted Malaysia</h2>
<p class="sub">Updated <span id="date"></span></p>
</header>

<div class="container">

<input id="search" placeholder="Cari...">

<div class="tabs">
  <button onclick="setTab('seller')" id="btnSeller">Seller</button>
  <button onclick="setTab('midman')" id="btnMidman" class="active">Midman</button>
  <button onclick="setTab('scam')" id="btnScam">Scam</button>
</div>

<div id="list"></div>

</div>

<script>

let data = [
  {nama:"MID IPANZZ", phone:"60175970694", type:"midman"},
  {nama:"SHOP ABC", phone:"60122222222", type:"seller"},
  {nama:"SCAMMER XYZ", phone:"60111111111", type:"scam"}
];

let currentTab = "midman";

/* RENDER */
function render(){
  let html="";

  data.forEach(d=>{
    if(d.type !== currentTab) return;

    let colorClass = d.type==="midman" ? "glow" :
                     d.type==="seller" ? "glow-blue" :
                     "glow-red";

    html += `
    <div class="card">
      <b class="${colorClass}">${d.nama}</b>
      <p>${d.phone}</p>

      <a class="btn" href="https://wa.me/${d.phone}" target="_blank">WhatsApp</a>
    </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

/* TAB */
function setTab(tab){
  currentTab = tab;

  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));

  if(tab==="seller") btnSeller.classList.add("active");
  if(tab==="midman") btnMidman.classList.add("active");
  if(tab==="scam") btnScam.classList.add("active");

  render();
}

/* SEARCH */
document.getElementById("search").addEventListener("keyup", function(){
  let val = this.value.toLowerCase();
  document.querySelectorAll(".card").forEach(card=>{
    card.style.display =
    card.innerText.toLowerCase().includes(val) ? "" : "none";
  });
});

/* DATE */
document.getElementById("date").innerText =
new Date().toLocaleDateString("ms-MY");

/* START */
render();

</script>

</body>
</html>
