<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>List Midman Trusted Malaysia</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background: linear-gradient(135deg,#0f0f0f,#1a1a1a);
  color:#fff;
}

/* HEADER */
header{
  text-align:center;
  padding:40px 20px 20px;
}
header h1{
  margin:0;
  font-size:26px;
}
header p{
  color:#aaa;
  font-size:14px;
}

/* CONTAINER */
.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

/* SEARCH */
input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  outline:none;
  background:#1f1f1f;
  color:#fff;
  margin-bottom:20px;
}

/* CARD */
.midman{
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:15px;
  padding:15px;
  margin-bottom:15px;
  transition:0.2s;
}

.midman:hover{
  transform:scale(1.02);
}

.midman h3{
  margin:0;
  font-size:16px;
}

.status{
  font-size:13px;
  color:#00ffcc;
}

/* BUTTON */
.btn{
  display:block;
  text-align:center;
  margin-top:10px;
  padding:12px;
  border-radius:10px;
  text-decoration:none;
  color:#fff;
  background: linear-gradient(90deg,#00ffcc,#00ccff);
  font-weight:bold;
}

/* BADGE */
.badge{
  background:#00ffcc;
  color:#000;
  padding:3px 8px;
  font-size:11px;
  border-radius:5px;
  margin-left:5px;
}

/* FOOTER */
footer{
  text-align:center;
  font-size:12px;
  color:#777;
  padding:20px;
}
</style>
</head>

<body>

<header>
  <h1>Midman Trusted Malaysia</h1>
  <p>Dikemaskini <span id="date"></span></p>
</header>

<div class="container">

<input type="text" id="search" placeholder="Cari nama midman...">

<div class="midman">
  <h3>MID IPANZZ <span class="badge">VERIFIED</span></h3>
  <p>0175970694</p>
  <p class="status">Trusted</p>
  <a class="btn" href="https://wa.me/60175970694">WhatsApp</a>
</div>

<div class="midman">
  <h3>SLRMYAPI</h3>
  <p>0104331830</p>
  <p class="status">Trusted</p>
  <a class="btn" href="https://wa.me/60104331830">WhatsApp</a>
</div>

</div>

<footer>
© 2026 Midman Malaysia
</footer>

<script>
document.getElementById("date").innerHTML =
  new Date().toLocaleDateString("ms-MY");

document.getElementById("search").addEventListener("keyup", function(){
  let value = this.value.toLowerCase();
  document.querySelectorAll(".midman").forEach(function(card){
    card.style.display = card.innerText.toLowerCase().includes(value)
    ? "" : "none";
  });
});
</script>

</body>
</html>
