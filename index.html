<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Midman Game UI</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
  overflow:hidden;
}

/* 🌌 BACKGROUND */
canvas{
  position:fixed;
  inset:0;
  z-index:-1;
}

/* 🎬 SPLASH */
#splash{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
  z-index:9999;
}

.logo{
  font-size:28px;
  font-weight:bold;
  background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:rainbow 4s linear infinite;
}

@keyframes rainbow{
  0%{background-position:0%}
  100%{background-position:400%}
}

/* APP */
#app{display:none}

/* HEADER */
header{
  text-align:center;
  padding:15px;
  font-size:20px;
  text-shadow:0 0 15px cyan;
}

/* TAB */
.tabs{
  display:flex;
  justify-content:center;
  gap:5px;
  padding:10px;
}

.tabs button{
  padding:8px 15px;
  border:none;
  border-radius:10px;
  background:#111;
  color:#aaa;
}

.active{
  background:#00ffcc;
  color:#000;
}

/* CARD */
.card{
  background:#111;
  margin:10px;
  padding:15px;
  border-radius:15px;
  box-shadow:0 0 15px #00ffcc44;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px #00ffcc;
}

/* NAME */
.name{
  font-weight:bold;
  background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:rainbow 4s linear infinite;
}

/* BUTTON */
.btn{
  display:block;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  text-align:center;
  text-decoration:none;
  font-weight:bold;
  color:#000;

  background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet);
  background-size:400%;
  animation:rainbow 4s linear infinite, pulse 1s infinite;
}

@keyframes pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.08)}
}

/* MUSIC BTN */
.music{
  position:fixed;
  top:10px;
  right:10px;
  background:#111;
  border:1px solid cyan;
  color:cyan;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- SPLASH -->
<div id="splash">
  <div class="logo">Midman Trusted</div>
</div>

<!-- APP -->
<div id="app">

<header>🎮 Midman Trusted Malaysia</header>

<button class="music" onclick="toggleMusic()">🎵</button>

<div class="tabs">
  <button onclick="setTab('midman')" id="btnMid" class="active">Midman</button>
  <button onclick="setTab('seller')" id="btnSeller">Seller</button>
  <button onclick="setTab('scam')" id="btnScam">Scam</button>
</div>

<div id="list"></div>

</div>

<!-- AUDIO -->
<audio id="bgm" loop>
  <source src="https://files.catbox.moe/3x0u8v.mp3">
</audio>

<script>

/* SPLASH */
setTimeout(()=>{
  splash.style.display="none";
  app.style.display="block";
},2000);

/* STAR */
let c = bg, ctx = c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let stars = Array.from({length:100},()=>({
  x:Math.random()*c.width,
  y:Math.random()*c.height,
  z:Math.random()*2+1
}));

function anim(){
  ctx.clearRect(0,0,c.width,c.height);
  ctx.fillStyle="#fff";
  stars.forEach(s=>{
    ctx.fillRect(s.x,s.y,s.z,s.z);
    s.y+=s.z;
    if(s.y>c.height) s.y=0;
  });
  requestAnimationFrame(anim);
}
anim();

/* DATA */
let data=[
  {nama:"MID IPANZZ",phone:"60175970694",type:"midman"},
  {nama:"SLRMYAPI",phone:"60104331830",type:"midman"},

  {nama:"SHOP ABC",phone:"60122222222",type:"seller"},

  {nama:"SCAMMER XYZ",phone:"60111111111",type:"scam"}
];

let currentTab="midman";

/* RENDER */
function render(){
  let html="";
  data.forEach(d=>{
    if(d.type!==currentTab) return;

    html+=`
    <div class="card">
      <div class="name">${d.nama}</div>
      <p>${d.phone}</p>
      <a class="btn" href="https://wa.me/${d.phone}" target="_blank">WhatsApp</a>
    </div>`;
  });
  list.innerHTML=html;
}

/* TAB */
function setTab(tab){
  currentTab=tab;

  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));

  if(tab==="midman") btnMid.classList.add("active");
  if(tab==="seller") btnSeller.classList.add("active");
  if(tab==="scam") btnScam.classList.add("active");

  render();
}

/* MUSIC */
let musicOn=false;
function toggleMusic(){
  let a=bgm;
  if(!musicOn){
    a.play().catch(()=>alert("Tekan lagi sekali"));
    musicOn=true;
  }else{
    a.pause();
    musicOn=false;
  }
}

render();

</script>

</body>
</html>
