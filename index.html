<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trusted List</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#0a0a0a;
  color:#fff;
}

/* INTRO */
#splash{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:#000;
  z-index:999;
}
.logo{
  width:70px;
  border-radius:50%;
  margin-bottom:15px;
}
.typing{
  font-size:16px;
  color:#0ff;
}

/* APP */
#app{display:none}

/* HEADER */
header{
  text-align:center;
  padding:18px;
  font-weight:600;
  font-size:16px;
}

/* TABS */
.tabs{
  display:flex;
  margin:10px;
  background:#111;
  border-radius:12px;
}
.tabs button{
  flex:1;
  padding:10px;
  border:none;
  background:none;
  color:#888;
}
.active{
  color:#fff;
  font-weight:600;
}

/* ADD */
.add{
  margin:10px;
  padding:12px;
  text-align:center;
  border-radius:12px;
  background:#111;
}

/* CARD */
.card{
  background:#111;
  margin:10px;
  padding:15px;
  border-radius:14px;
}

/* COLORS */
.midman{border-left:4px solid #22c55e}
.seller{border-left:4px solid #3b82f6}
.scam{border-left:4px solid #ef4444}

/* PROFILE */
.profile{
  display:flex;
  gap:10px;
  align-items:center;
}
.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
}

/* NAME */
.name{
  font-weight:600;
}

/* VERIFY */
.verify{
  margin-left:5px;
  font-size:12px;
  color:#3b82f6;
}

/* BUTTON */
.btn{
  display:block;
  margin-top:10px;
  padding:10px;
  text-align:center;
  border-radius:10px;
  background:#0ff;
  color:#000;
  text-decoration:none;
  font-weight:500;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="splash">
<img src="https://i.imgur.com/2DhmtJ4.png" class="logo">
<div class="typing" id="typing"></div>
</div>

<div id="app">

<header>LIST MIDMAN TRUSTED MALAYSIA</header>

<div class="tabs">
<button onclick="setTab('midman')" id="btnMid" class="active">Midman</button>
<button onclick="setTab('seller')" id="btnSeller">Seller</button>
<button onclick="setTab('scam')" id="btnScam">Scammer</button>
</div>

<div class="add" onclick="addData()">+ Tambah</div>

<div id="list"></div>

</div>

<script>
/* INTRO */
const texts=["Welcome","Trusted Midman","Seller & Scammer List"];
let i=0,j=0;

function type(){
typing.innerHTML=texts[i].substring(0,j++);
if(j>texts[i].length){
j=0;i=(i+1)%texts.length;
}
setTimeout(type,80);
}
type();

setTimeout(()=>{
splash.style.display="none";
app.style.display="block";
},2500);

/* DATA LOCAL (simple dulu) */
let data=[
{nama:"MID IPANZZ",phone:"60175970694",type:"midman",verified:true,avatar:"https://i.imgur.com/2DhmtJ4.png"}
];

let tab="midman";

/* RENDER */
function render(){
let html="";
data.forEach(d=>{
if(d.type!==tab) return;

html+=`
<div class="card ${d.type}">
<div class="profile">
<img src="${d.avatar}" class="avatar">
<div>
<div class="name">${d.nama}${d.verified?'<span class="verify">✔</span>':''}</div>
<div>${d.phone}</div>
</div>
</div>
<a class="btn" href="https://wa.me/${d.phone}" target="_blank">WhatsApp</a>
</div>`;
});
list.innerHTML=html;
}

/* TAB */
function setTab(t){
tab=t;
document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
if(t==="midman") btnMid.classList.add("active");
if(t==="seller") btnSeller.classList.add("active");
if(t==="scam") btnScam.classList.add("active");
render();
}

/* ADD */
function addData(){
let nama=prompt("Nama:");
let phone=prompt("Phone:");
let type=prompt("Type (midman/seller/scam):");

data.push({nama,phone,type,verified:true,avatar:"https://i.imgur.com/2DhmtJ4.png"});
render();
}

render();
</script>

</body>
</html>
