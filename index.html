<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Midman Trusted Malaysia</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0b0b0b;
  color:#fff;
}

/* HEADER */
header{
  text-align:center;
  padding:30px 10px;
}

.profile{
  width:80px;
  height:80px;
  border-radius:50%;
  border:2px solid #fff;
  margin-bottom:10px;
}

header h1{
  margin:0;
  font-size:20px;
}

header p{
  color:#aaa;
  font-size:13px;
}

/* CONTAINER */
.container{
  max-width:500px;
  margin:auto;
  padding:15px;
}

/* SEARCH */
input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#111;
  color:#fff;
  margin-bottom:15px;
}

/* CARD */
.midman{
  background:#111;
  border:1px solid #222;
  border-radius:14px;
  padding:15px;
  margin-bottom:15px;
}

.midman h3{
  margin:0;
  font-size:15px;
}

.status{
  font-size:12px;
  color:#00ff99;
}

/* BUTTON */
.btn{
  display:block;
  text-align:center;
  margin-top:10px;
  padding:12px;
  border-radius:10px;
  background: linear-gradient(90deg,#d946ef,#3b82f6);
  color:#fff;
  text-decoration:none;
  font-weight:bold;
}

/* BADGE */
.badge{
  background:#00ff99;
  color:#000;
  font-size:10px;
  padding:3px 6px;
  border-radius:5px;
  margin-left:5px;
}
</style>
</head>

<body>

<header>
  <img src="https://via.placeholder.com/100" class="profile">
  <h1>Midman Trusted Malaysia</h1>
  <p>Updated <span id="date"></span></p>
</header>

<div class="container">

<input type="text" id="search" placeholder="Search midman...">

<div id="list"></div>

</div>

<script>
const data = [
  {
    nama: "MID IPANZZ",
    phone: "60175970694",
    verified: true
  },
  {
    nama: "SLRMYAPI",
    phone: "60104331830",
    verified: false
  }
];

const list = document.getElementById("list");

data.forEach(item => {
  list.innerHTML += `
  <div class="midman">
    <h3>${item.nama} ${item.verified ? '<span class="badge">VERIFIED</span>' : ''}</h3>
    <p>${item.phone}</p>
    <p class="status">Trusted</p>
    <a class="btn" href="https://wa.me/${item.phone}">WhatsApp</a>
  </div>
  `;
});

/* DATE */
document.getElementById("date").innerText =
new Date().toLocaleDateString("ms-MY");

/* SEARCH */
document.getElementById("search").addEventListener("keyup", function(){
  let value = this.value.toLowerCase();
  document.querySelectorAll(".midman").forEach(function(card){
    card.style.display = card.innerText.toLowerCase().includes(value)
    
  
    ? "" : "none";
  });
});
</script>

</body>
</html>

;
}

.profile{
  width:80px;
  border-radius:50%;
  background:#000;
  padding:5px;
  box-shadow: 0 0 15px #00ffc3;
}
