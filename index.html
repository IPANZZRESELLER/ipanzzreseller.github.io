<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trusted System Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Orbitron';background:#000;color:#fff}

/* INTRO */
#splash{
position:fixed;inset:0;display:flex;justify-content:center;align-items:center;background:#000;z-index:999
}
.logo{width:80px;border-radius:50%;box-shadow:0 0 20px #0ff}
.typing{text-align:center;margin-top:20px;font-size:20px}

/* LOGIN */
#login{
display:none;
position:fixed;
inset:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
gap:10px;
}
input{padding:10px;border-radius:10px;border:none}
button{padding:10px;border:none;border-radius:10px}

/* APP */
#app{display:none}

/* HEADER */
header{text-align:center;padding:20px;text-shadow:0 0 10px #0ff}

/* SEARCH */
.search{margin:10px;padding:10px;width:90%}

/* TABS */
.tabs{display:flex;margin:10px;background:#111;border-radius:10px}
.tabs button{flex:1;padding:10px;background:none;border:none;color:#888}
.active{color:#fff}

/* CARD */
.card{margin:10px;padding:15px;border-radius:14px}
.midman{border:1px solid #22c55e}
.seller{border:1px solid #3b82f6}
.scam{border:1px solid #ef4444}

/* PROFILE */
.profile{display:flex;gap:10px}
.avatar{width:45px;height:45px;border-radius:50%}

/* VERIFY */
.verify{background:#3b82f6;border-radius:50%;padding:2px 5px;margin-left:5px}

/* BTN */
.btn{display:block;margin-top:10px;padding:10px;text-align:center;border:1px solid #0ff;border-radius:10px;color:#fff;text-decoration:none}

/* DELETE */
.delete{color:red;font-size:12px;margin-top:5px}
</style>
</head>

<body>

<!-- INTRO -->
<div id="splash">
<div>
<img src="https://i.imgur.com/2DhmtJ4.png" class="logo">
<div class="typing" id="typing"></div>
</div>
</div>

<!-- LOGIN -->
<div id="login">
<input type="password" id="pass" placeholder="Admin Password">
<button onclick="login()">Login Admin</button>
<button onclick="enterUser()">Masuk sebagai User</button>
</div>

<!-- APP -->
<div id="app">

<header>LIST MIDMAN TRUSTED MALAYSIA</header>

<input class="search" placeholder="Search..." oninput="searchData(this.value)">

<div class="tabs">
<button onclick="setTab('midman')" id="btnMid" class="active">Midman</button>
<button onclick="setTab('seller')" id="btnSeller">Seller</button>
<button onclick="setTab('scam')" id="btnScam">Scam</button>
</div>

<div id="addBtn" onclick="addData()" style="display:none">+ Tambah</div>

<div id="list"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* CONFIG */
const firebaseConfig={apiKey:"ISI",authDomain:"ISI",projectId:"ISI"};
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let tab="midman";
let allData=[];
let filtered=[];
let isAdmin=false;

/* INTRO + LOGIN */
setTimeout(()=>{
splash.style.display="none";
login.style.display="flex";
},3000);

/* TYPING */
const text=["Welcome","Trusted System","Midman Seller Scammer"];
let ti=0,tj=0,del=false;
function type(){
let t=text[ti];
typing.innerHTML=t.substring(0,tj);
if(!del){tj++;if(tj>t.length){del=true;setTimeout(type,1000);return}}
else{tj--;if(tj==0){del=false;ti=(ti+1)%text.length}}
setTimeout(type,60);
}
type();

/* LOGIN */
window.login=function(){
if(pass.value==="ipanzz"){
isAdmin=true;
startApp();
addBtn.style.display="block";
}else alert("Wrong");
}

window.enterUser=function(){
startApp();
}

function startApp(){
login.style.display="none";
app.style.display="block";
loadData();
}

/* LOAD */
async function loadData(){
const snap=await getDocs(collection(db,"list"));
allData=[];
snap.forEach(d=>allData.push({...d.data(),id:d.id}));
filtered=[...allData];
render();
}

/* SEARCH */
window.searchData=function(q){
filtered=allData.filter(d=>d.nama.toLowerCase().includes(q.toLowerCase()));
render();
}

/* RENDER */
function render(){
let html="";
filtered.forEach(d=>{
if(d.type!==tab) return;

html+=`
<div class="card ${d.type}">
<div class="profile">
<img class="avatar" src="${d.avatar}">
<div>
<div>${d.nama} ${d.verified?'<span class="verify">✔</span>':''}</div>
<div>${d.phone}</div>
</div>
</div>

<a class="btn" href="https://wa.me/${d.phone}" target="_blank">WhatsApp</a>

${isAdmin?`<div class="delete" onclick="del('${d.id}')">Delete</div>`:""}
</div>`;
});
list.innerHTML=html;
}

/* DELETE */
window.del=async function(id){
await deleteDoc(doc(db,"list",id));
loadData();
}

/* ADD */
window.addData=async function(){
let nama=prompt("Nama:");
let phone=prompt("Phone:");
let type=prompt("Type:");
let verified=confirm("Verified?");

await addDoc(collection(db,"list"),{
nama,phone,type,verified,
avatar:"https://i.imgur.com/2DhmtJ4.png"
});
loadData();
}

/* TAB */
window.setTab=function(t){
tab=t;
document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
if(t==="midman") btnMid.classList.add("active");
if(t==="seller") btnSeller.classList.add("active");
if(t==="scam") btnScam.classList.add("active");
render();
}
</script>

</body>
</html>
