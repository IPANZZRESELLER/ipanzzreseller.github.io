<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trusted System</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Orbitron',sans-serif;
  background:#000;
  color:#fff;
}

/* INTRO */
#splash{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
}

.logo{
  text-align:center;
  font-size:24px;
}

.line{
  display:block;
  opacity:0;
  transform:translateY(15px);
}

.line.show{
  animation:fade 0.6s forwards;
}

@keyframes fade{
  to{opacity:1;transform:translateY(0)}
}

#app{display:none}

/* HEADER */
header{
  text-align:center;
  padding:20px;
  font-size:22px;
  text-shadow:0 0 10px #f0f,0 0 20px #f0f;
}

/* TABS */
.tabs{
  display:flex;
  margin:10px;
  background:#111;
  border-radius:12px;
}

.tabs button{
  flex:1;
  padding:10px;
  background:none;
  border:none;
  color:#aaa;
}

.active{color:#fff}

/* CARD */
.card{
  margin:10px;
  padding:15px;
  border-radius:15px;
}

/* COLORS + GLOW */
.midman{border:1px solid #22c55e;box-shadow:0 0 10px #22c55e}
.seller{border:1px solid #3b82f6;box-shadow:0 0 10px #3b82f6}
.scam{border:1px solid #ef4444;box-shadow:0 0 10px #ef4444}

/* PROFILE */
.profile{
  display:flex;
  gap:10px;
}

.avatar{
  width:45px;
  height:45px;
  border-radius:50%;
}

.logoSmall{
  width:18px;
  height:18px;
  border-radius:50%;
}

/* NAME */
.name{
  text-shadow:0 0 5px #fff,0 0 10px #0ff,0 0 20px #0ff;
}

/* BUTTON */
.btn{
  display:block;
  margin-top:10px;
  padding:10px;
  text-align:center;
  border-radius:10px;
  color:#fff;
  border:1px solid #0ff;
  box-shadow:0 0 10px #0ff;
  text-decoration:none;
}

/* DELETE */
.delete{
  margin-top:8px;
  color:red;
  font-size:12px;
}
</style>
</head>

<body>

<div id="splash">
  <div class="logo">
    <span class="line">Welcome to</span>
    <span class="line">Midman / Seller Trusted</span>
    <span class="line">& List Scammer</span>
  </div>
</div>

<div id="app">

<header>Trusted System</header>

<div class="tabs">
<button onclick="setTab('midman')" id="btnMid" class="active">Midman</button>
<button onclick="setTab('seller')" id="btnSeller">Seller</button>
<button onclick="setTab('scam')" id="btnScam">Scam</button>
</div>

<div onclick="addData()" style="margin:10px;padding:10px;border:1px solid #333;border-radius:10px;text-align:center">
+ Tambah
</div>

<div id="list"></div>

</div>

<script>
let tab="midman";

let data=[
{
nama:"MID IPANZZ",
phone:"60175970694",
type:"midman",
verified:true,
avatar:"https://i.imgur.com/2DhmtJ4.png",
logo:""
}
];

/* INTRO */
setTimeout(()=>{
document.querySelectorAll(".line").forEach((e,i)=>{
setTimeout(()=>e.classList.add("show"),i*500);
});

setTimeout(()=>{
splash.style.display="none";
app.style.display="block";
},2000);
},300);

/* RENDER */
function render(){
let html="";
data.forEach((d,i)=>{
if(d.type!==tab) return;

html+=`
<div class="card ${d.type}">
<div class="profile">
<img class="avatar" src="${d.avatar}">
<div>
<div class="name">
${d.nama} ${d.verified?'✔️':''}
${d.logo?`<img src="${d.logo}" class="logoSmall">`:''}
</div>
<div>${d.phone}</div>
</div>
</div>

<a class="btn" href="https://wa.me/${d.phone}" target="_blank">WhatsApp</a>

<div class="delete" onclick="del(${i})">Delete</div>
</div>
`;
});
list.innerHTML=html;
}

/* ADD */
function addData(){
let nama=prompt("Nama:");
let phone=prompt("Phone:");
let type=prompt("Type (midman/seller/scam):");
let avatar=prompt("Link gambar:");
let logo=prompt("Logo:");
let verified=confirm("Verified?");

data.push({nama,phone,type,avatar,logo,verified});
render();
}

/* DELETE */
function del(i){
data.splice(i,1);
render();
}

/* TAB */
function setTab(t){
tab=t;
document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
if(t==="midman") btnMid.classList.add("active");
if(t==="seller") btnSeller.classList.add("active");
if(t==="scam") btnScam.classList.add("active");
render();
}

render();
</script>

</body>
</html>
