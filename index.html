<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Midman Trusted Malaysia</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background: radial-gradient(circle at top,#0a0a0a,#000);
  color:#fff;
}

/* HEADER */
header{
  text-align:center;
  padding:50px 20px 20px;
  animation: fadeDown 0.8s ease;
}

header h1{
  font-size:28px;
  margin:0;
  background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: rainbowMove 5s linear infinite;
  
  @keyframes rainbowMove{
  0%{ background-position:0% }
  100%{ background-position:200% }
}
}
  margin:0;
}

header p{
  color:#888;
}

/* CONTAINER */
.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

/* SEARCH */
input{
  width:100%;
  padding:15px;
  border-radius:14px;
  border:none;
  background:#111;
  color:#fff;
  margin-bottom:20px;
  font-size:14px;
}

/* CARD */
.midman{
  background: rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-radius:16px;
  padding:18px;
  margin-bottom:15px;
  transition:0.3s;
  animation: fadeUp 0.6s ease;
}

.midman:hover{
  transform: translateY(-5px);
  border-color:#00ffc3;
  box-shadow:0 0 15px rgba(0,255,195,0.2);
  box-shadow: 0 0 15px red, 0 0 25px orange, 0 0 35px cyan;
}

.midman h3{
  margin:0;
  font-size:16px;
}

.status{
  font-size:12px;
  color:#00ffc3;
}

/* BUTTON */
.btn{
  display:block;
  text-align:center;
  margin-top:12px;
  padding:12px;
  border-radius:12px;
  background: linear-gradient(270deg, red, orange, yellow, green, cyan, blue, violet);
  background-size: 400% 400%;
  color:#000;
  text-decoration:none;
  font-weight:600;
  animation: rainbowBtn 5s ease infinite;
  
  @keyframes rainbowBtn{
  0%{ background-position:0% 50% }
  50%{ background-position:100% 50% }
  100%{ background-position:0% 50% }
}
}
}

.btn:hover{
  transform:scale(1.05);
}

/* BADGE */
.badge{
  background:#00ffc3;
  color:#000;
  font-size:10px;
  padding:3px 7px;
  border-radius:5px;
  margin-left:6px;
}

/* FOOTER */
footer{
  text-align:center;
  color:#666;
  font-size:12px;
  padding:20px;
}

/* ANIMATION */
@keyframes fadeUp{
  from{
    opacity:0;
    transform: translateY(20px);
  }
  to{
    opacity:1;
    transform: translateY(0);
  }
}

@keyframes fadeDown{
  from{
    opacity:0;
    transform: translateY(-20px);
  }
  to{
    opacity:1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<header>
  <h1>Midman Trusted Malaysia</h1>
  <p>Updated <span id="date"></span></p>
</header>

<div class="container">

<input type="text" id="search" placeholder="Search midman...">

<div class="midman">
  <h3>MID IPANZZ <span class="badge">VERIFIED</span></h3>
  <p>0175970694</p>
  <p class="status">Trusted</p>
  <a class="btn" href="https://wa.me/60175970694">WhatsApp</a>
</div>

<div class="midman">
  <h3>SLRMYAPI</h3>
  <p>0104331830</p>
  <p class="status">Trusted</p>
  <a class="btn" href="https://wa.me/60104331830">WhatsApp</a>
</div>

</div>

<footer>
© 2026 Midman Malaysia
</footer>

<script>
document.getElementById("date").innerText =
new Date().toLocaleDateString("ms-MY");

document.getElementById("search").addEventListener("keyup", function(){
let value = this.value.toLowerCase();
document.querySelectorAll(".midman").forEach(function(card){
card.style.display = card.innerText.toLowerCase().includes(value)
? "" : "none";
});
});
</script>

</body>
</html>
