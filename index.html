<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Midman Trusted Malaysia</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* HEADER */
header{
  padding:20px;
}

.sub{color:#888;font-size:13px}

/* CONTAINER */
.container{
  max-width:500px;
  margin:auto;
  padding:15px;
}

/* SEARCH */
input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#111;
  color:#fff;
  margin-bottom:10px;
}

/* TAB */
.tabs{
  display:flex;
  gap:5px;
  margin-bottom:10px;
}

.tabs button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#111;
  color:#fff;
}

.active{
  background:#00ff99;
  color:#000;
}

/* SLIDE */
#list{
  transition:0.3s;
}

/* CARD */
.card{
  background:#111;
  border-radius:12px;
  padding:15px;
  margin-bottom:10px;
  display:flex;
  gap:10px;
  align-items:center;
}

/* AVATAR */
.avatar{
  width:45px;
  height:45px;
  border-radius:50%;
  background:#00ff99;
  color:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

/* INFO */
.info{flex:1}

/* BUTTON */
.btn{
  display:block;
  margin-top:5px;
  padding:8px;
  border-radius:8px;
  text-align:center;
  text-decoration:none;
  background:#25D366;
  color:#fff;
}

.copy{
  background:#222;
  border:none;
  color:#fff;
  padding:6px;
  border-radius:6px;
  margin-top:5px;
}

/* BADGE */
.badge{
  background:#00ff99;
  color:#000;
  font-size:10px;
  padding:2px 5px;
  border-radius:5px;
  margin-left:5px;
}

/* COLOR */
.seller{color:#00ffcc;}
.midman{color:#00ff99;}
.scam{color:red;}
</style>
</head>

<body>

<header>
<h2>Midman Trusted Malaysia</h2>
<p class="sub">Updated <span id="date"></span></p>
</header>

<div class="container">

<input id="search" placeholder="Cari...">

<div class="tabs">
  <button onclick="setTab('seller')" id="btnSeller">Seller</button>
  <button onclick="setTab('midman')" id="btnMidman" class="active">Midman</button>
  <button onclick="setTab('scam')" id="btnScam">Scam</button>
</div>

<div id="list"></div>

</div>

<script>

/* DATA */
let data = [
  {nama:"MID IPANZZ", phone:"60175970694", type:"midman", rating:5, verified:true},
  {nama:"SLRMYAPI", phone:"60104331830", type:"midman", rating:4},

  {nama:"SHOP ABC", phone:"60122222222", type:"seller", rating:5},

  {nama:"SCAMMER XYZ", phone:"60111111111", type:"scam", rating:1}
];

let currentTab = "midman";

/* AVATAR */
function avatar(name){
  return name.charAt(0);
}

/* RENDER */
function render(){
  let html="";

  let list = data
    .filter(d=>d.type===currentTab)
    .sort((a,b)=>(b.rating||0)-(a.rating||0)); // top dulu

  list.forEach(d=>{
    html += `
    <div class="card">
      <div class="avatar">${avatar(d.nama)}</div>

      <div class="info">
        <b class="${d.type}">
          ${d.nama}
          ${d.verified ? '<span class="badge">VERIFIED</span>' : ''}
        </b>

        <div>${"⭐".repeat(d.rating||5)}</div>

        <button class="copy" onclick="copy('${d.phone}')">Copy</button>
        <a class="btn" href="https://wa.me/${d.phone}" target="_blank">WhatsApp</a>
      </div>
    </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

/* TAB */
function setTab(tab){
  currentTab = tab;

  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));

  if(tab==="seller") btnSeller.classList.add("active");
  if(tab==="midman") btnMidman.classList.add("active");
  if(tab==="scam") btnScam.classList.add("active");

  document.getElementById("list").style.transform="translateX(20px)";
  setTimeout(()=>{
    document.getElementById("list").style.transform="translateX(0)";
    render();
  },100);
}

/* SWIPE */
let startX = 0;

document.addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e=>{
  let endX = e.changedTouches[0].clientX;

  if(startX - endX > 50){
    if(currentTab==="seller") setTab("midman");
    else if(currentTab==="midman") setTab("scam");
  }

  if(endX - startX > 50){
    if(currentTab==="scam") setTab("midman");
    else if(currentTab==="midman") setTab("seller");
  }
});

/* SEARCH */
document.getElementById("search").addEventListener("keyup", function(){
  let val = this.value.toLowerCase();
  document.querySelectorAll(".card").forEach(card=>{
    card.style.display =
    card.innerText.toLowerCase().includes(val) ? "" : "none";
  });
});

/* COPY */
function copy(num){
  navigator.clipboard.writeText(num);
  alert("Copied!");
}

/* DATE */
document.getElementById("date").innerText =
new Date().toLocaleDateString("ms-MY");

/* START */
render();

</script>

</body>
</html>
