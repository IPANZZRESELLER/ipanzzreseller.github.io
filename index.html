<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midman Trusted Malaysia | Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #001EFF;
            --accent: #00d4ff;
            --bg: #000000;
            --glow: 0 0 20px rgba(0, 30, 255, 0.6);
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 50% 0%, #001EFF44 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, #001EFF22 0%, transparent 30%),
                radial-gradient(circle at 0% 50%, #001EFF11 0%, transparent 30%);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Animations --- */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 15px rgba(0, 30, 255, 0.3); }
            50% { box-shadow: 0 0 30px rgba(0, 30, 255, 0.6); }
            100% { box-shadow: 0 0 15px rgba(0, 30, 255, 0.3); }
        }

        @keyframes scan {
            0% { top: -100%; }
            100% { top: 100%; }
        }

        /* --- Header Section --- */
        .hero {
            padding: 100px 20px 80px;
            display: flex;
            justify-content: center;
        }

        .hero-box {
            border: 2px solid var(--primary);
            padding: 60px 20px;
            background: rgba(0, 30, 255, 0.03);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            max-width: 1000px;
            width: 100%;
            text-align: center;
            position: relative;
            animation: pulse-glow 3s infinite ease-in-out;
            overflow: hidden;
        }

        /* Scanline effect */
        .hero-box::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 50px;
            background: linear-gradient(to bottom, transparent, rgba(0, 30, 255, 0.1), transparent);
            animation: scan 4s linear infinite;
            left: 0;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.2rem, 8vw, 4.5rem);
            font-weight: 900;
            line-height: 1;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 0 0 20px var(--primary), 0 0 40px var(--primary);
            text-transform: uppercase;
        }

        .subtitle {
            color: var(--accent);
            font-size: clamp(0.8rem, 2.5vw, 1.2rem);
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        /* --- Grid & Cards --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 20px 100px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(20px);
            animation: float 6s infinite ease-in-out;
        }

        .card:hover {
            transform: scale(1.03);
            border-color: var(--accent);
            box-shadow: 0 0 40px rgba(0, 30, 255, 0.4);
            background: rgba(255, 255, 255, 0.08);
        }

        .card-content {
            position: relative;
            z-index: 2;
        }

        .verify-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 30, 255, 0.2);
            border: 1px solid var(--primary);
            color: #fff;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 700;
            width: fit-content;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .check-icon {
            background: #25d366;
            color: black;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 900;
        }

        .name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 2px;
        }

        .tagline {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .wa-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            color: #fff;
            text-decoration: none;
            border-radius: 14px;
            font-weight: 800;
            font-size: 0.9rem;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 30, 255, 0.3);
        }

        .wa-btn:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 25px var(--primary);
            letter-spacing: 1px;
        }

        /* Reflection Light Effect */
        .card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 60%);
            pointer-events: none;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .hero-box { padding: 40px 15px; border-radius: 20px; }
            .card { animation: none; } /* Disable float on mobile for better perf */
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="hero-box">
            <h1>LIST MIDMAN<br>TRUSTED MALAYSIA</h1>
            <p class="subtitle">Semua midman ini telah melepasi semakkan midman</p>
        </div>
    </section>

    <main class="grid" id="list-container">
        </main>

    <script>
        const midmen = [
            { name: "MID EPOL", link: "https://wa.me/60137314591" },
            { name: "EPOL BACKUP", link: "https://wa.me/60105491599" },
            { name: "MID IPANZZ", link: "https://wa.me/60175970694" },
            { name: "MID KUSA", link: "https://wa.me/601170130314" },
            { name: "SLRMY", link: "https://wa.me/601136871190" },
            { name: "AASHOP", link: "https://wa.me/60179981705" },
            { name: "MID LEX", link: "https://wa.me/60166105139" },
            { name: "ANOS", link: "https://wa.me/601161324347" },
            { name: "MILO SIANG", link: "https://wa.me/60184035510" },
            { name: "MILO MALAM", link: "https://wa.me/60187905510" },
            { name: "MILO OFFICIAL", link: "https://wa.me/60163025510" },
            { name: "MANN STORE", link: "https://wa.me/601163174853" }
        ];

        const container = document.getElementById('list-container');

        midmen.forEach((m, i) => {
            const card = document.createElement('div');
            card.className = 'card';
            // Staggered floating delay
            card.style.animationDelay = `${i * 0.2}s`;
            
            card.innerHTML = `
                <div class="card-content">
                    <div class="verify-badge">
                        <span class="check-icon">✓</span>
                        VERIFIED
                    </div>
                    <div class="name">${m.name}</div>
                    <div class="tagline">Verified Midman</div>
                    <a href="${m.link}" target="_blank" class="wa-btn">
                        WHATSAPP NOW
                    </a>
                </div>
            `;
            container.appendChild(card);
        });
    </script>
</body>
</html>
