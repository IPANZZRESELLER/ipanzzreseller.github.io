<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Midman Trusted Malaysia</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#000;
  color:#fff;
}

/* HEADER */
header{
  text-align:center;
  padding:20px;
  font-size:20px;
  font-weight:bold;
  color:#00ffcc;
  text-shadow:0 0 10px #00ffcc;
}

/* CONTAINER */
.container{
  max-width:500px;
  margin:auto;
  padding:15px;
}

/* SEARCH */
input{
  width:100%;
  padding:12px;
  border-radius:14px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  color:#fff;
  margin-bottom:15px;
}

/* TAB (iOS STYLE) */
.tabs{
  display:flex;
  background:rgba(255,255,255,0.05);
  border-radius:14px;
  padding:4px;
  backdrop-filter:blur(10px);
  margin-bottom:15px;
}

.tabs button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  background:transparent;
  color:#aaa;
  transition:0.3s;
}

.active{
  background:#00ffcc;
  color:#000;
  box-shadow:0 0 10px #00ffcc;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  border-radius:18px;
  padding:15px;
  margin-bottom:12px;
  transition:0.2s;
}

.card:active{
  transform:scale(0.97);
}

/* NAME */
.name{
  font-weight:bold;
  font-size:16px;
  color:#00ffcc;
}

.top{
  color:#fff;
  text-shadow:0 0 10px gold;
}

/* PHONE */
.phone{
  font-size:13px;
  color:#aaa;
}

/* 🌈 RAINBOW BUTTON */
.rainbow-btn{
  display:block;
  margin-top:10px;
  padding:10px;
  border-radius:12px;
  text-align:center;
  text-decoration:none;
  font-weight:bold;
  color:#000;

  background:linear-gradient(
    90deg,
    #00ffcc,#00aaff,#00ffcc
  );
  background-size:200%;
  animation:rainbowMove 3s linear infinite;

  box-shadow:0 0 12px #00ffcc;
}

@keyframes rainbowMove{
  0%{background-position:0%}
  100%{background-position:200%}
}

.rainbow-btn:active{
  transform:scale(0.95);
}

/* BOTTOM MENU */
.bottom{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(15px);
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}

.bottom button{
  background:none;
  border:none;
  color:#aaa;
  font-size:12px;
}

.bottom .active{
  color:#00ffcc;
  text-shadow:0 0 10px #00ffcc;
}
</style>
</head>

<body>

<header>Midman Trusted Malaysia</header>

<div class="container">

<input id="search" placeholder="Cari...">

<div class="tabs">
  <button onclick="setTab('seller')" id="btnSeller">Seller</button>
  <button onclick="setTab('midman')" id="btnMidman" class="active">Midman</button>
  <button onclick="setTab('scam')" id="btnScam">Scam</button>
</div>

<div id="list"></div>

</div>

<!-- BOTTOM -->
<div class="bottom">
  <button onclick="setTab('midman')" id="bMid" class="active">⭐<br>Midman</button>
  <button onclick="setTab('seller')" id="bSeller">🛒<br>Seller</button>
  <button onclick="setTab('scam')" id="bScam">⚠️<br>Scam</button>
</div>

<script>

let data = [
  {nama:"MID IPANZZ", phone:"60175970694", type:"midman", top:true},
  {nama:"SLRMYAPI", phone:"60104331830", type:"midman"},

  {nama:"SHOP ABC", phone:"60122222222", type:"seller"},

  {nama:"SCAMMER XYZ", phone:"60111111111", type:"scam"}
];

let currentTab = "midman";

/* RENDER */
function render(){
  let html="";

  data.forEach(d=>{
    if(d.type !== currentTab) return;

    html += `
    <div class="card">
      <div class="name ${d.top ? 'top':''}">
        ${d.top ? '🔥 ' : ''}${d.nama}
      </div>

      <div class="phone">${d.phone}</div>

      <a class="rainbow-btn" href="https://wa.me/${d.phone}" target="_blank">
        WhatsApp
      </a>
    </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

/* TAB */
function setTab(tab){
  currentTab = tab;

  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".bottom button").forEach(b=>b.classList.remove("active"));

  if(tab==="seller"){ btnSeller.classList.add("active"); bSeller.classList.add("active"); }
  if(tab==="midman"){ btnMidman.classList.add("active"); bMid.classList.add("active"); }
  if(tab==="scam"){ btnScam.classList.add("active"); bScam.classList.add("active"); }

  render();
}

/* SEARCH */
document.getElementById("search").addEventListener("keyup", function(){
  let val = this.value.toLowerCase();
  document.querySelectorAll(".card").forEach(card=>{
    card.style.display =
    card.innerText.toLowerCase().includes(val) ? "" : "none";
  });
});

/* START */
render();

</script>

</body>
</html>
