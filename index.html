<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Midman Trusted Malaysia</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
}

/* HEADER */
header{
  padding:20px;
}

h1{margin:0}
.sub{color:#888;font-size:13px}

/* CONTAINER */
.container{
  max-width:500px;
  margin:auto;
  padding:15px;
}

/* SEARCH */
input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#111;
  color:#fff;
  margin-bottom:15px;
}

/* TAB BUTTON */
.tabs{
  display:flex;
  gap:5px;
  margin-bottom:15px;
}

.tabs button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#111;
  color:#fff;
}

.active{
  background:#00ff99;
  color:#000;
}

/* CARD */
.card{
  background:#111;
  border-radius:12px;
  padding:15px;
  margin-bottom:10px;
}

/* BUTTON */
.btn{
  display:block;
  margin-top:8px;
  padding:10px;
  border-radius:8px;
  text-align:center;
  text-decoration:none;
  background:#25D366;
  color:#fff;
}

.copy{
  background:#222;
  border:none;
  color:#fff;
  padding:8px;
  border-radius:8px;
  margin-top:5px;
}

/* TITLE COLOR */
.seller{color:#00ffcc;}
.midman{color:#00ff99;}
.scam{color:red;}
</style>
</head>

<body>

<header>
<h1>Midman Trusted Malaysia</h1>
<p class="sub">Updated <span id="date"></span></p>
</header>

<div class="container">

<input id="search" placeholder="Cari...">

<div class="tabs">
  <button onclick="setTab('seller')" id="btnSeller">Seller</button>
  <button onclick="setTab('midman')" id="btnMidman" class="active">Midman</button>
  <button onclick="setTab('scam')" id="btnScam">Scam</button>
</div>

<div id="list"></div>

</div>

<script>

/* DATA */
let data = [
  {nama:"MID IPANZZ", phone:"60175970694", type:"midman"},
  {nama:"SLRMYAPI", phone:"60104331830", type:"midman"},

  {nama:"SHOP ABC", phone:"60122222222", type:"seller"},

  {nama:"SCAMMER XYZ", phone:"60111111111", type:"scam"}
];

let currentTab = "midman";

/* RENDER */
function render(){
  let html="";

  data.forEach(d=>{
    if(d.type !== currentTab) return;

    html += `
    <div class="card">
      <b class="${d.type}">${d.nama}</b>
      <p>${d.phone}</p>

      <button class="copy" onclick="copy('${d.phone}')">Copy</button>
      <a class="btn" href="https://wa.me/${d.phone}" target="_blank">WhatsApp</a>
    </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

/* TAB SWITCH */
function setTab(tab){
  currentTab = tab;

  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  
  if(tab==="seller") document.getElementById("btnSeller").classList.add("active");
  if(tab==="midman") document.getElementById("btnMidman").classList.add("active");
  if(tab==="scam") document.getElementById("btnScam").classList.add("active");

  render();
}

/* SEARCH */
document.getElementById("search").addEventListener("keyup", function(){
  let val = this.value.toLowerCase();
  document.querySelectorAll(".card").forEach(card=>{
    card.style.display =
    card.innerText.toLowerCase().includes(val) ? "" : "none";
  });
});

/* COPY */
function copy(num){
  navigator.clipboard.writeText(num);
  alert("Copied!");
}

/* DATE */
document.getElementById("date").innerText =
new Date().toLocaleDateString("ms-MY");

/* START */
render();

</script>

</body>
</html>
