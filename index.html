<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Midman Trusted Malaysia</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
}

/* HEADER */
header{
  padding:20px;
}

/* 🌈 TITLE ULTRA */
.title{
  font-size:22px;
  font-weight:bold;
  background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet,red);
  background-size:400%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:rainbowMove 5s linear infinite;
  text-shadow:0 0 10px #fff,0 0 20px #0ff,0 0 40px #0ff;
}

@keyframes rainbowMove{
  0%{background-position:0%}
  100%{background-position:400%}
}

/* CONTAINER */
.container{
  max-width:500px;
  margin:auto;
  padding:15px;
}

/* SEARCH */
input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#111;
  color:#fff;
  margin-bottom:10px;
}

/* TAB */
.tabs{
  display:flex;
  gap:5px;
  margin-bottom:10px;
}

.tabs button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#111;
  color:#fff;
  transition:0.3s;
}

.tabs button:hover{
  box-shadow:0 0 10px #00ffcc;
}

.active{
  background:#00ff99;
  color:#000;
  box-shadow:0 0 15px #00ff99;
}

/* 🌈 CARD NEON */
.card{
  background:#111;
  border-radius:12px;
  padding:15px;
  margin-bottom:12px;
  position:relative;
  overflow:hidden;
}

/* RAINBOW BORDER */
.card::before{
  content:"";
  position:absolute;
  inset:0;
  padding:2px;
  border-radius:12px;
  background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet);
  background-size:400%;
  animation:rainbowMove 6s linear infinite;
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
}

/* HOVER EFFECT */
.card:hover{
  transform:scale(1.03);
  box-shadow:0 0 15px #00ffcc;
}

/* NAME GLOW */
.name{
  font-weight:bold;
  font-size:16px;
  color:#00ffcc;
  text-shadow:0 0 5px #00ffcc,0 0 15px #00ffcc;
}

/* TOP TRUSTED */
.top{
  color:#fff;
  text-shadow:0 0 10px gold,0 0 20px gold,0 0 40px gold;
}

/* BUTTON */
.btn{
  display:block;
  margin-top:8px;
  padding:10px;
  border-radius:8px;
  text-align:center;
  text-decoration:none;
  background:#25D366;
  color:#fff;
  transition:0.3s;
}

.btn:hover{
  box-shadow:0 0 10px #25D366;
}
</style>
</head>

<body>

<header>
<div class="title">Midman Trusted Malaysia</div>
</header>

<div class="container">

<input id="search" placeholder="Cari...">

<div class="tabs">
  <button onclick="setTab('seller')" id="btnSeller">Seller</button>
  <button onclick="setTab('midman')" id="btnMidman" class="active">Midman</button>
  <button onclick="setTab('scam')" id="btnScam">Scam</button>
</div>

<div id="list"></div>

</div>

<script>

let data = [
  {nama:"MID IPANZZ", phone:"60175970694", type:"midman", top:true},
  {nama:"SLRMYAPI", phone:"60104331830", type:"midman"},

  {nama:"SHOP ABC", phone:"60122222222", type:"seller"},

  {nama:"SCAMMER XYZ", phone:"60111111111", type:"scam"}
];

let currentTab = "midman";

/* RENDER */
function render(){
  let html="";

  data.forEach(d=>{
    if(d.type !== currentTab) return;

    html += `
    <div class="card">
      <div class="name ${d.top ? 'top':''}">
        ${d.top ? '🔥 ' : ''}${d.nama}
      </div>

      <p>${d.phone}</p>

      <a class="btn" href="https://wa.me/${d.phone}" target="_blank">WhatsApp</a>
    </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

/* TAB */
function setTab(tab){
  currentTab = tab;

  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));

  if(tab==="seller") btnSeller.classList.add("active");
  if(tab==="midman") btnMidman.classList.add("active");
  if(tab==="scam") btnScam.classList.add("active");

  render();
}

/* SEARCH */
document.getElementById("search").addEventListener("keyup", function(){
  let val = this.value.toLowerCase();
  document.querySelectorAll(".card").forEach(card=>{
    card.style.display =
    card.innerText.toLowerCase().includes(val) ? "" : "none";
  });
});

/* START */
render();

</script>

</body>
</html>
