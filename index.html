<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trusted Midman List</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#000;
  color:#fff;
}

/* INTRO */
#splash{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
  z-index:999;
  text-align:center;
}
.introText{
  display:block;
  opacity:0;
  font-size:20px;
}
.introText.show{
  animation:fade .5s forwards;
}
@keyframes fade{to{opacity:1}}

#app{display:none}

/* HEADER */
header{
  text-align:center;
  padding:20px;
  font-size:18px;
  font-weight:600;
}

/* TABS */
.tabs{
  display:flex;
  margin:10px;
  background:#111;
  border-radius:12px;
}
.tabs button{
  flex:1;
  padding:10px;
  border:none;
  background:none;
  color:#888;
}
.active{color:#fff}

/* CARD */
.card{
  margin:10px;
  padding:15px;
  border-radius:14px;
  background:#0f0f0f;
}

/* COLORS */
.midman{border-left:4px solid #22c55e}
.seller{border-left:4px solid #3b82f6}
.scam{border-left:4px solid #ef4444}

/* PROFILE */
.profile{
  display:flex;
  gap:10px;
  cursor:pointer;
}
.avatar{
  width:45px;
  height:45px;
  border-radius:50%;
}

/* NAME */
.name{
  font-weight:600;
}

/* VERIFY */
.verify{
  margin-left:5px;
  font-size:12px;
  color:#3b82f6;
}

/* BUTTON */
.btn{
  display:block;
  margin-top:10px;
  padding:10px;
  text-align:center;
  border-radius:10px;
  background:#222;
  color:#fff;
  text-decoration:none;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="splash">
  <div>
    <span class="introText">WELCOME</span>
    <span class="introText">LIST MIDMAN TRUSTED</span>
    <span class="introText">MALAYSIA</span>
  </div>
</div>

<div id="app">

<header>LIST MIDMAN TRUSTED MALAYSIA</header>

<div class="tabs">
<button onclick="setTab('midman')" id="btnMid" class="active">Midman</button>
<button onclick="setTab('seller')" id="btnSeller">Seller</button>
<button onclick="setTab('scam')" id="btnScam">Scammer</button>
</div>

<div id="list"></div>

</div>

<script>

/* ANTI HITAM INTRO */
function startApp(){
  document.getElementById("splash").style.display="none";
  document.getElementById("app").style.display="block";
}

/* Intro animation + fallback */
setTimeout(()=>{
  document.querySelectorAll(".introText").forEach((e,i)=>{
    setTimeout(()=>e.classList.add("show"),i*500);
  });

  setTimeout(startApp,2000);
},200);

/* BACKUP kalau animation gagal */
setTimeout(startApp,4000);

/* DATA (EDIT SINI JE) */
let data = [
{
nama:"MID IPANZZ",
phone:"60175970694",
type:"midman",
verified:true,
avatar:"https://i.imgur.com/2DhmtJ4.png"
},

{
nama:"SELLER ALI",
phone:"60123456789",
type:"seller",
verified:true,
avatar:"https://i.imgur.com/2DhmtJ4.png"
},

{
nama:"SCAMMER XYZ",
phone:"60111111111",
type:"scam",
verified:false,
avatar:"https://i.imgur.com/2DhmtJ4.png"
}

];

let tab="midman";

/* COPY */
function copyWa(num){
  navigator.clipboard.writeText("https://wa.me/"+num);
  alert("Copied");
}

/* RENDER */
function render(){
  let html="";
  data.forEach(d=>{
    if(d.type!==tab) return;

    html+=`
    <div class="card ${d.type}">
      <div class="profile" onclick="copyWa('${d.phone}')">
        <img src="${d.avatar}" class="avatar">
        <div>
          <div class="name">
            ${d.nama}
            ${d.verified?'<span class="verify">✔</span>':''}
          </div>
          <div>${d.phone}</div>
        </div>
      </div>

      <a class="btn" href="https://wa.me/${d.phone}" target="_blank">WhatsApp</a>
    </div>`;
  });

  document.getElementById("list").innerHTML=html;
}

/* TAB */
function setTab(t){
  tab=t;
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  if(t==="midman") btnMid.classList.add("active");
  if(t==="seller") btnSeller.classList.add("active");
  if(t==="scam") btnScam.classList.add("active");
  render();
}

/* START */
render();

</script>

</body>
</html>
