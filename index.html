<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trusted System</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Orbitron';background:#000;color:#fff}

/* HEADER */
.cyber-header{text-align:center;padding:20px;font-size:18px}
.cyber-header span{
background:linear-gradient(90deg,#f0f,#0ff,#0f0,#ff0);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:move 5s linear infinite;
}
@keyframes move{100%{background-position:300%}}

.tabs{display:flex;margin:10px;background:#111;border-radius:10px}
.tabs button{flex:1;padding:10px;background:none;border:none;color:#aaa}
.active{color:#fff}

.card{margin:10px;padding:15px;border-radius:15px}
.midman{box-shadow:0 0 10px #22c55e}
.seller{box-shadow:0 0 10px #3b82f6}
.scam{box-shadow:0 0 10px #ef4444}

.profile{display:flex;gap:10px;cursor:pointer}
.avatar{width:45px;height:45px;border-radius:50%}

.name{font-weight:700}
.verifyStar{color:gold}

.btn{display:block;margin-top:10px;padding:10px;text-align:center;
border:1px solid #0ff;border-radius:10px;color:#fff;text-decoration:none}

</style>
</head>

<body>

<header class="cyber-header">
<span>LIST MIDMAN TRUSTED MALAYSIA</span>
</header>

<div class="tabs">
<button onclick="setTab('midman')" id="btnMid" class="active">Midman</button>
<button onclick="setTab('seller')" id="btnSeller">Seller</button>
<button onclick="setTab('scam')" id="btnScam">Scam</button>
</div>

<div onclick="addData()" style="margin:10px;padding:10px;border:1px solid #333;text-align:center">
+ Tambah
</div>

<div id="list"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 MASUKKAN CONFIG SINI */
const firebaseConfig = {
apiKey:"ISI",
authDomain:"ISI",
projectId:"ISI"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let tab="midman";
let allData=[];

/* LOAD DATA */
async function loadData(){
const snap = await getDocs(collection(db,"data"));
allData=[];
snap.forEach(d=>allData.push(d.data()));
render();
}

/* COPY */
function copyWa(num){
navigator.clipboard.writeText("https://wa.me/"+num);
alert("Copied");
}

/* RENDER */
function render(){
let html="";
allData.forEach(d=>{
if(d.type!==tab) return;

html+=`
<div class="card ${d.type}">
<div class="profile" onclick="copyWa('${d.phone}')">
<img class="avatar" src="${d.avatar}">
<div>
<div class="name">
${d.nama} ${d.verified?'<span class="verifyStar">★</span>':''}
</div>
<div>${d.phone}</div>
</div>
</div>
<a class="btn" href="https://wa.me/${d.phone}" target="_blank">WhatsApp</a>
</div>
`;
});
list.innerHTML=html;
}

/* UPLOAD IMAGE */
async function uploadImage(file){
let form=new FormData();
form.append("file",file);
form.append("upload_preset","ISI_PRESET");

let res=await fetch("https://api.cloudinary.com/v1_1/ISI_CLOUD/image/upload",{
method:"POST",
body:form
});

let data=await res.json();
return data.secure_url;
}

/* ADD */
window.addData=async function(){

let nama=prompt("Nama:");
let phone=prompt("Phone:");
let type=prompt("Type:");

let fileInput=document.createElement("input");
fileInput.type="file";

fileInput.onchange=async ()=>{
let file=fileInput.files[0];
let avatar=await uploadImage(file);

let verified=confirm("Verified?");

await addDoc(collection(db,"data"),{
nama,phone,type,avatar,verified
});

loadData();
};

fileInput.click();
}

/* TAB */
window.setTab=function(t){
tab=t;
document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
if(t==="midman") btnMid.classList.add("active");
if(t==="seller") btnSeller.classList.add("active");
if(t==="scam") btnScam.classList.add("active");
render();
}

loadData();
</script>

</body>
</html>
