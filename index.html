<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Midman Trusted Malaysia</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:#fff;
}

header{
  text-align:center;
  padding:30px 10px;
}

.profile{
  width:90px;
  border-radius:50%;
  background:#fff;
  padding:5px;
  margin-bottom:10px;
}

.container{
  max-width:500px;
  margin:auto;
  padding:15px;
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#111;
  color:#fff;
  margin-bottom:10px;
}

.admin-btn{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #d946ef;
  color:#d946ef;
  background:transparent;
  margin-bottom:15px;
}

.midman{
  background:#111;
  border:1px solid #222;
  border-radius:14px;
  padding:15px;
  margin-bottom:15px;
}

.midman img{
  width:40px;
  height:40px;
  border-radius:50%;
  margin-bottom:5px;
}

.status{
  font-size:12px;
  color:#00ff99;
}

.btn{
  display:block;
  text-align:center;
  margin-top:10px;
  padding:12px;
  border-radius:10px;
  background: linear-gradient(90deg,#d946ef,#3b82f6);
  color:#fff;
  text-decoration:none;
}

.badge{
  background:#00ff99;
  color:#000;
  font-size:10px;
  padding:3px 6px;
  border-radius:5px;
  margin-left:5px;
}
</style>
</head>

<body>

<header>
<img src="logo_transparent_v2.png" class="profile">
<h2>Midman Trusted Malaysia</h2>
<p>Updated <span id="date"></span></p>
</header>

<div class="container">

<input type="text" id="search" placeholder="Search midman...">

<button class="admin-btn" onclick="addMidman()">+ Tambah Midman</button>

<div id="list"></div>

</div>

<script>
let data = [
  {
    nama:"MID IPANZZ",
    phone:"60175970694",
    verified:true,
    rating:5,
    img:"https://via.placeholder.com/40"
  }
];

function render(){
  let list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(item=>{
    list.innerHTML += `
    <div class="midman">
      <img src="${item.img}">
      <h3>${item.nama} ${item.verified ? '<span class="badge">VERIFIED</span>' : ''}</h3>
      <p>${item.phone}</p>
      <p class="status">⭐ ${item.rating}/5</p>
      <a class="btn" href="https://wa.me/${item.phone}">WhatsApp</a>
    </div>
    `;
  });
}

render();

/* SEARCH */
document.getElementById("search").addEventListener("keyup", function(){
  let value = this.value.toLowerCase();
  document.querySelectorAll(".midman").forEach(card=>{
    card.style.display = card.innerText.toLowerCase().includes(value)
    ? "" : "none";
  });
});

/* ADMIN */
function addMidman(){
  let pass = prompt("Password:");

  if(pass === "ipanzz"){
    let nama = prompt("Nama:");
    let phone = prompt("Phone (601..):");
    let rating = prompt("Rating (1-5):");
    let img = prompt("Link gambar:");

    data.push({
      nama,
      phone,
      verified:true,
      rating,
      img
    });

    render();
  } else {
    alert("Salah password");
  }
}

/* DATE */
document.getElementById("date").innerText =
new Date().toLocaleDateString("ms-MY");
</script>

</body>
</html>
