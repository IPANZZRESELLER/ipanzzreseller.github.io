<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Midman Trusted Malaysia</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#000;
  color:#fff;
}

/* 🔥 SPLASH SCREEN */
#splash{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

/* LOGO ANIMATION */
.logo{
  font-size:26px;
  font-weight:bold;
  color:#00ffcc;
  text-shadow:0 0 20px #00ffcc,0 0 40px #00ffcc;
  animation:zoom 1.5s ease;
}

@keyframes zoom{
  0%{transform:scale(0.7);opacity:0}
  100%{transform:scale(1);opacity:1}
}

/* FADE OUT */
.hide{
  animation:fadeOut 0.8s forwards;
}

@keyframes fadeOut{
  to{opacity:0;visibility:hidden}
}

/* MAIN APP */
#app{
  display:none;
  animation:fadeIn 1s forwards;
}

@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

/* HEADER */
header{
  text-align:center;
  padding:20px;
  font-size:20px;
  font-weight:bold;
  color:#00ffcc;
  text-shadow:0 0 10px #00ffcc;
}

/* CONTAINER */
.container{
  max-width:500px;
  margin:auto;
  padding:15px;
}

/* SEARCH */
input{
  width:100%;
  padding:12px;
  border-radius:14px;
  border:none;
  background:rgba(255,255,255,0.05);
  color:#fff;
  margin-bottom:15px;
}

/* TAB */
.tabs{
  display:flex;
  background:rgba(255,255,255,0.05);
  border-radius:14px;
  padding:4px;
  margin-bottom:15px;
}

.tabs button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  background:transparent;
  color:#aaa;
}

.active{
  background:#00ffcc;
  color:#000;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  border-radius:18px;
  padding:15px;
  margin-bottom:12px;
}

/* TEXT */
.name{
  font-weight:bold;
  color:#00ffcc;
}

.top{
  color:#fff;
  text-shadow:0 0 10px gold;
}

.phone{
  font-size:13px;
  color:#aaa;
}

/* 🌈 BUTTON */
.rainbow-btn{
  display:block;
  margin-top:10px;
  padding:10px;
  border-radius:12px;
  text-align:center;
  text-decoration:none;
  font-weight:bold;
  color:#000;

  background:linear-gradient(90deg,#00ffcc,#00aaff,#00ffcc);
  background-size:200%;
  animation:move 3s linear infinite;

  box-shadow:0 0 12px #00ffcc;
}

@keyframes move{
  0%{background-position:0%}
  100%{background-position:200%}
}

/* BOTTOM */
.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:rgba(0,0,0,0.7);
  padding:10px 0;
}

.bottom button{
  background:none;
  border:none;
  color:#aaa;
}

.bottom .active{
  color:#00ffcc;
}
</style>
</head>

<body>

<!-- 🔥 SPLASH -->
<div id="splash">
  <div class="logo">Midman Trusted Malaysia</div>
</div>

<!-- APP -->
<div id="app">

<header>Midman Trusted Malaysia</header>

<div class="container">

<input id="search" placeholder="Cari...">

<div class="tabs">
  <button onclick="setTab('midman')" id="btnMid" class="active">Midman</button>
  <button onclick="setTab('seller')" id="btnSeller">Seller</button>
  <button onclick="setTab('scam')" id="btnScam">Scam</button>
</div>

<div id="list"></div>

</div>

<div class="bottom">
  <button onclick="setTab('midman')" id="bMid" class="active">⭐</button>
  <button onclick="setTab('seller')" id="bSeller">🛒</button>
  <button onclick="setTab('scam')" id="bScam">⚠️</button>
</div>

</div>

<script>

/* SPLASH CONTROL */
setTimeout(()=>{
  document.getElementById("splash").classList.add("hide");
  document.getElementById("app").style.display="block";
},2500);

/* DATA */
let data=[
  {nama:"MID IPANZZ", phone:"60175970694", type:"midman", top:true},
  {nama:"SLRMYAPI", phone:"60104331830", type:"midman"}
];

let currentTab="midman";

/* RENDER */
function render(){
  let html="";

  data.forEach(d=>{
    if(d.type!==currentTab) return;

    html+=`
    <div class="card">
      <div class="name ${d.top?'top':''}">
        ${d.top?'🔥 ':''}${d.nama}
      </div>
      <div class="phone">${d.phone}</div>

      <a class="rainbow-btn" href="https://wa.me/${d.phone}" target="_blank">
        WhatsApp
      </a>
    </div>`;
  });

  list.innerHTML=html;
}

/* TAB */
function setTab(tab){
  currentTab=tab;

  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".bottom button").forEach(b=>b.classList.remove("active"));

  if(tab==="midman"){btnMid.classList.add("active");bMid.classList.add("active")}
  if(tab==="seller"){btnSeller.classList.add("active");bSeller.classList.add("active")}
  if(tab==="scam"){btnScam.classList.add("active");bScam.classList.add("active")}

  render();
}

/* SEARCH */
search.addEventListener("keyup",function(){
  let v=this.value.toLowerCase();
  document.querySelectorAll(".card").forEach(c=>{
    c.style.display=c.innerText.toLowerCase().includes(v)?"":"none";
  });
});

/* START */
render();

</script>

</body>
</html>
