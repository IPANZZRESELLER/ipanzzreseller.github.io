<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trusted Midman List</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#000;
  color:#fff;
}

/* 🌈 RAINBOW */
@keyframes rainbow{
  0%{background-position:0%}
  100%{background-position:400%}
}

/* 🎬 INTRO */
#splash{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.logo{
  font-size:26px;
  font-weight:600;

  background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet);
  background-size:400%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  animation:rainbow 6s linear infinite;
}

#app{display:none}

/* HEADER */
header{
  text-align:center;
  padding:25px;
  font-size:22px;
  font-weight:600;

  background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet);
  background-size:400%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  animation:rainbow 10s linear infinite;
}

/* CONTAINER */
.container{
  max-width:500px;
  margin:auto;
  padding:10px;
}

/* TABS */
.tabs{
  display:flex;
  background:#111;
  border-radius:14px;
  padding:5px;
  margin-bottom:15px;
}

.tabs button{
  flex:1;
  padding:10px;
  border:none;
  background:transparent;
  color:#aaa;
  border-radius:10px;
}

.active{
  color:#fff;
}

/* ADD BUTTON */
.add{
  border:1px solid #333;
  border-radius:14px;
  padding:12px;
  text-align:center;
  margin-bottom:15px;
  color:#ccc;
}

/* CARD */
.card{
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:16px;
  padding:15px;
  margin-bottom:15px;
}

/* 🌈 NAME LED */
.name{
  font-weight:600;
  font-size:16px;

  background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet);
  background-size:400%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  animation:rainbow 8s linear infinite;
}

.phone{
  font-size:13px;
  color:#aaa;
  margin-top:3px;
}

/* 🌈 BUTTON LED */
.btn{
  display:block;
  margin-top:12px;
  padding:12px;
  text-align:center;
  border-radius:12px;
  text-decoration:none;
  font-weight:500;

  background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet);
  background-size:400%;
  animation:rainbow 6s linear infinite;

  color:#000;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="splash">
  <div class="logo">Trusted Midman List</div>
</div>

<div id="app">

<header>Trusted Midman List</header>

<div class="container">

<div class="tabs">
  <button onclick="setTab('midman')" id="btnMid" class="active">Midman</button>
  <button onclick="setTab('seller')" id="btnSeller">Seller</button>
  <button onclick="setTab('scam')" id="btnScam">Scam</button>
</div>

<div class="add" onclick="addData()">+ Tambah</div>

<div id="list"></div>

</div>

</div>

<script>

/* INTRO */
setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("app").style.display="block";
},1500);

/* DATA */
let data = JSON.parse(localStorage.getItem("listData")) || [
  {nama:"MID IPANZZ", phone:"60175970694", type:"midman"}
];

let currentTab = "midman";

/* SAVE */
function save(){
  localStorage.setItem("listData", JSON.stringify(data));
}

/* RENDER */
function render(){
  let html="";

  data.forEach(d=>{
    if(d.type !== currentTab) return;

    html += `
    <div class="card">
      <div class="name">${d.nama}</div>
      <div class="phone">${d.phone}</div>
      <a class="btn" href="https://wa.me/${d.phone}" target="_blank">
        WhatsApp
      </a>
    </div>`;
  });

  document.getElementById("list").innerHTML = html;
}

/* TAB */
function setTab(tab){
  currentTab = tab;

  document.querySelectorAll(".tabs button").forEach(b=>{
    b.classList.remove("active");
  });

  if(tab==="midman") btnMid.classList.add("active");
  if(tab==="seller") btnSeller.classList.add("active");
  if(tab==="scam") btnScam.classList.add("active");

  render();
}

/* ADD */
function addData(){
  let pass = prompt("Password:");
  if(pass !== "ipanzz") return alert("Salah");

  let nama = prompt("Nama:");
  let phone = prompt("Phone:");
  let type = prompt("Type (midman/seller/scam):");

  data.push({nama,phone,type});
  save();
  render();
}

/* START */
render();

</script>

</body>
</html>
