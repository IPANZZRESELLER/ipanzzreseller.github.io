<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Midman Trusted Malaysia</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#000; /* FULL HITAM */
  color:#fff;
}

/* HEADER */
header{
  padding:25px 15px;
}

h1{
  margin:0;
  font-size:22px;
}

.sub{
  color:#888;
  margin-top:5px;
  font-size:13px;
}

/* CONTAINER */
.container{
  max-width:500px;
  margin:auto;
  padding:15px;
}

/* SEARCH (FIX NO WHITE) */
input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  outline:none;
  background:#111; /* HITAM */
  color:#fff;
  margin-bottom:15px;
}

/* FILTER */
.filter button{
  background:#111;
  color:#fff;
  border:none;
  padding:8px 10px;
  border-radius:8px;
  margin:3px;
}

/* CARD */
.card{
  background:#111;
  border:1px solid #1f1f1f;
  border-radius:12px;
  padding:15px;
  margin-bottom:10px;
}

/* STATUS */
.trusted{color:#00ff99;}
.scam{color:red;}
.warning{color:orange;}

/* BUTTON */
.btn{
  display:block;
  margin-top:8px;
  padding:10px;
  border-radius:8px;
  text-align:center;
  text-decoration:none;
  background:#25D366;
  color:#fff;
}

.copy{
  background:#222;
  color:#fff;
  border:none;
}

/* BADGE */
.badge{
  background:#00ff99;
  color:#000;
  font-size:10px;
  padding:3px 6px;
  border-radius:5px;
  margin-left:5px;
}
</style>
</head>

<body>

<header>
<h1>Midman Trusted Malaysia</h1>
<p class="sub">Updated <span id="date"></span></p>
<p class="sub" id="total"></p>
</header>

<div class="container">

<input id="search" placeholder="Cari midman...">

<div class="filter">
  <button onclick="setFilter('all')">All</button>
  <button onclick="setFilter('trusted')">Trusted</button>
  <button onclick="setFilter('scam')">Scam</button>
</div>

<div id="list"></div>

</div>

<script>

/* DATA */
let data = [
  {nama:"MID IPANZZ", phone:"60175970694", rating:5, status:"trusted", verified:true},
  {nama:"SLRMYAPI", phone:"60104331830", rating:5, status:"trusted"},
  {nama:"MIDMAN AASHOP", phone:"60179981705", rating:5, status:"trusted"},
  {nama:"SCAMMER XYZ", phone:"60111111111", rating:1, status:"scam"}
];

let filter = "all";

/* RENDER */
function render(){
  let html = "";

  let filtered = data.filter(d=>{
    if(filter==="all") return true;
    return d.status === filter;
  });

  document.getElementById("total").innerText =
    "Total: " + filtered.length;

  filtered.forEach(d=>{
    html += `
    <div class="card">
      <b>${d.nama} ${d.verified ? '<span class="badge">VERIFIED</span>' : ''}</b>
      <p>${d.phone}</p>
      <p>${"⭐".repeat(d.rating)}</p>
      <p class="${d.status}">Status: ${d.status}</p>

      <button class="copy" onclick="copy('${d.phone}')">Copy</button>
      <a class="btn" href="https://wa.me/${d.phone}" target="_blank">WhatsApp</a>
    </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

/* FILTER */
function setFilter(f){
  filter = f;
  render();
}

/* SEARCH */
document.getElementById("search").addEventListener("keyup", function(){
  let val = this.value.toLowerCase();
  document.querySelectorAll(".card").forEach(card=>{
    card.style.display =
    card.innerText.toLowerCase().includes(val) ? "" : "none";
  });
});

/* COPY */
function copy(num){
  navigator.clipboard.writeText(num);
  alert("Copied!");
}

/* DATE */
document.getElementById("date").innerText =
new Date().toLocaleDateString("ms-MY");

/* START */
render();

</script>

</body>
</html>
