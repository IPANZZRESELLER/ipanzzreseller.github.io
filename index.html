<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Midman Trusted</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
  overflow:hidden;
}

/* BACKGROUND */
canvas{
  position:fixed;
  inset:0;
  z-index:-1;
}

/* SPLASH */
#splash{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
  z-index:9999;
}

.logo{
  font-size:26px;
  font-weight:bold;
  background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet);
  background-size:400%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:rainbow 4s linear infinite;
}

@keyframes rainbow{
  0%{background-position:0%}
  100%{background-position:400%}
}

/* APP */
#app{display:none}

/* HEADER */
header{
  text-align:center;
  padding:15px;
  font-size:20px;
}

/* TABS */
.tabs{
  display:flex;
  justify-content:center;
  gap:5px;
}

.tabs button{
  padding:8px 12px;
  border:none;
  border-radius:10px;
  background:#111;
  color:#aaa;
}

.active{
  background:#00ffcc;
  color:#000;
}

/* CARD */
.card{
  background:#111;
  margin:10px;
  padding:15px;
  border-radius:12px;
}

.name{
  font-weight:bold;
  background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:rainbow 5s linear infinite;
}

/* BUTTON */
.btn{
  display:block;
  margin-top:10px;
  padding:10px;
  text-align:center;
  border-radius:10px;
  text-decoration:none;
  color:#000;
  font-weight:bold;

  background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet);
  background-size:400%;
  animation:rainbow 4s linear infinite;
}

/* MUSIC */
.music{
  position:fixed;
  top:10px;
  right:10px;
  background:#111;
  border:1px solid cyan;
  color:cyan;
  padding:8px;
  border-radius:10px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div id="splash">
  <div class="logo">Midman Trusted</div>
</div>

<div id="app">

<header>Midman Trusted Malaysia</header>

<button class="music" id="musicBtn">🎵</button>

<div class="tabs">
  <button id="btnMid" class="active">Midman</button>
  <button id="btnSeller">Seller</button>
  <button id="btnScam">Scam</button>
</div>

<div id="list"></div>

</div>

<audio id="bgm" loop>
  <source src="https://files.catbox.moe/3x0u8v.mp3">
</audio>

<script>

/* GET ELEMENT (IMPORTANT FIX) */
const splash = document.getElementById("splash");
const app = document.getElementById("app");
const list = document.getElementById("list");

const btnMid = document.getElementById("btnMid");
const btnSeller = document.getElementById("btnSeller");
const btnScam = document.getElementById("btnScam");

const musicBtn = document.getElementById("musicBtn");
const bgm = document.getElementById("bgm");

/* SPLASH */
setTimeout(()=>{
  splash.style.display="none";
  app.style.display="block";
},2000);

/* STAR BG */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = Array.from({length:100},()=>({
  x:Math.random()*canvas.width,
  y:Math.random()*canvas.height,
  s:Math.random()*2
}));

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#fff";

  stars.forEach(star=>{
    ctx.fillRect(star.x,star.y,star.s,star.s);
    star.y += star.s;
    if(star.y > canvas.height) star.y = 0;
  });

  requestAnimationFrame(animate);
}
animate();

/* DATA */
let data = [
  {nama:"MID IPANZZ", phone:"60175970694", type:"midman"},
  {nama:"SLRMYAPI", phone:"60104331830", type:"midman"},
  {nama:"SHOP ABC", phone:"60122222222", type:"seller"},
  {nama:"SCAMMER XYZ", phone:"60111111111", type:"scam"}
];

let currentTab = "midman";

/* RENDER */
function render(){
  let html="";
  data.forEach(d=>{
    if(d.type !== currentTab) return;

    html += `
    <div class="card">
      <div class="name">${d.nama}</div>
      <p>${d.phone}</p>
      <a class="btn" href="https://wa.me/${d.phone}" target="_blank">
        WhatsApp
      </a>
    </div>`;
  });

  list.innerHTML = html;
}

/* TAB CLICK */
btnMid.onclick = ()=>{
  currentTab="midman";
  setActive(btnMid);
};

btnSeller.onclick = ()=>{
  currentTab="seller";
  setActive(btnSeller);
};

btnScam.onclick = ()=>{
  currentTab="scam";
  setActive(btnScam);
};

function setActive(btn){
  [btnMid,btnSeller,btnScam].forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  render();
}

/* MUSIC FIX */
let musicOn=false;

musicBtn.onclick = ()=>{
  if(!musicOn){
    bgm.play().catch(()=>alert("Tekan lagi sekali"));
    musicOn=true;
  }else{
    bgm.pause();
    musicOn=false;
  }
};

/* START */
render();

</script>

</body>
</html>
