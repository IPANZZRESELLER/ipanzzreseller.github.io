<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Midman Trusted Malaysia</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0b0b0b;
  color:#fff;
}

/* INTRO */
#splash{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.logo{
  font-size:28px;
  font-weight:600;
  background:linear-gradient(90deg,#d946ef,#3b82f6);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 20px #d946ef55;
  animation:fade 1.5s ease;
}

@keyframes fade{
  from{opacity:0; transform:translateY(10px)}
  to{opacity:1; transform:translateY(0)}
}

/* APP */
#app{display:none}

/* HEADER */
header{
  text-align:center;
  padding:20px;
  font-size:18px;
  font-weight:600;
}

/* TABS */
.tabs{
  display:flex;
  margin:10px;
  background:#111;
  border-radius:12px;
  padding:5px;
}

.tabs button{
  flex:1;
  padding:10px;
  border:none;
  background:transparent;
  color:#aaa;
  border-radius:10px;
  transition:0.2s;
}

.tabs button:hover{
  color:#fff;
}

.active{
  background:linear-gradient(90deg,#d946ef,#3b82f6);
  color:#fff;
  box-shadow:0 0 10px #3b82f6aa;
}

/* CARD */
.card{
  background:#111;
  margin:10px;
  padding:15px;
  border-radius:14px;
  border:1px solid #222;
  transition:0.2s;
}

.card:hover{
  transform:translateY(-3px);
  box-shadow:0 0 15px #3b82f633;
}

/* NAME */
.name{
  font-weight:600;
  margin-bottom:5px;
}

/* PHONE */
.phone{
  font-size:13px;
  color:#aaa;
}

/* BUTTON */
.btn{
  display:block;
  margin-top:10px;
  padding:12px;
  text-align:center;
  border-radius:10px;
  background:linear-gradient(90deg,#d946ef,#3b82f6);
  color:#fff;
  text-decoration:none;
  transition:0.2s;
}

.btn:hover{
  box-shadow:0 0 12px #3b82f6aa;
}

/* MUSIC */
.music{
  position:fixed;
  top:10px;
  right:10px;
  background:#111;
  border:1px solid #333;
  color:#fff;
  padding:8px;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="splash">
  <div class="logo">Midman Trusted Malaysia</div>
</div>

<!-- APP -->
<div id="app">

<header>Midman Trusted Malaysia</header>

<button class="music" id="musicBtn">🎵</button>

<div class="tabs">
  <button id="btnMid" class="active">Midman</button>
  <button id="btnSeller">Seller</button>
  <button id="btnScam">Scam</button>
</div>

<div id="list"></div>

</div>

<audio id="bgm" loop>
  <source src="https://files.catbox.moe/3x0u8v.mp3">
</audio>

<script>

/* ELEMENT */
const splash = document.getElementById("splash");
const app = document.getElementById("app");
const list = document.getElementById("list");

const btnMid = document.getElementById("btnMid");
const btnSeller = document.getElementById("btnSeller");
const btnScam = document.getElementById("btnScam");

const musicBtn = document.getElementById("musicBtn");
const bgm = document.getElementById("bgm");

/* INTRO */
setTimeout(()=>{
  splash.style.display="none";
  app.style.display="block";
},1500);

/* DATA */
let data = [
  {nama:"MID IPANZZ", phone:"60175970694", type:"midman"},
  {nama:"SLRMYAPI", phone:"60104331830", type:"midman"},
  {nama:"SHOP ABC", phone:"60122222222", type:"seller"},
  {nama:"SCAMMER XYZ", phone:"60111111111", type:"scam"}
];

let currentTab="midman";

/* RENDER */
function render(){
  let html="";
  data.forEach(d=>{
    if(d.type !== currentTab) return;

    html += `
    <div class="card">
      <div class="name">${d.nama}</div>
      <div class="phone">${d.phone}</div>
      <a class="btn" href="https://wa.me/${d.phone}" target="_blank">
        WhatsApp
      </a>
    </div>`;
  });

  list.innerHTML = html;
}

/* TAB */
btnMid.onclick=()=>{currentTab="midman";setActive(btnMid);}
btnSeller.onclick=()=>{currentTab="seller";setActive(btnSeller);}
btnScam.onclick=()=>{currentTab="scam";setActive(btnScam);}

function setActive(btn){
  [btnMid,btnSeller,btnScam].forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  render();
}

/* MUSIC */
let musicOn=false;
musicBtn.onclick=()=>{
  if(!musicOn){
    bgm.play().catch(()=>alert("Tekan lagi sekali"));
    musicOn=true;
  }else{
    bgm.pause();
    musicOn=false;
  }
};

/* START */
render();

</script>

</body>
</html>
