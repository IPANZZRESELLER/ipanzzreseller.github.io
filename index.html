<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trusted System</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#000;
  color:#fff;
}

/* 🌈 RAINBOW */
@keyframes rainbow{
  0%{background-position:0%}
  100%{background-position:400%}
}

/* 🎬 INTRO */
#splash{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.logo{
  font-size:26px;
  font-weight:600;
  background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet);
  background-size:400%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:rainbow 8s linear infinite;
}

#app{display:none}

/* HEADER */
header{
  text-align:center;
  padding:25px;
  font-size:22px;

  background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet);
  background-size:400%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  animation:rainbow 12s linear infinite;
}

/* TABS */
.tabs{
  display:flex;
  margin:10px;
  background:#111;
  border-radius:14px;
  padding:5px;
}

.tabs button{
  flex:1;
  padding:10px;
  border:none;
  background:transparent;
  color:#aaa;
  border-radius:10px;
}

.active{
  color:#fff;
  background:#222;
}

/* ADD */
.add{
  margin:10px;
  padding:12px;
  border-radius:14px;
  border:1px solid #333;
  text-align:center;
}

/* CARD BASE */
.card{
  margin:10px;
  padding:15px;
  border-radius:16px;
  border:1px solid #222;
}

/* COLORS BY TYPE */
.midman{ background:#0f1f0f; border-color:#22c55e; }
.seller{ background:#0f172a; border-color:#3b82f6; }
.scam{ background:#1f0f0f; border-color:#ef4444; }

/* NAME */
.name{
  font-weight:600;
  font-size:16px;

  background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet);
  background-size:400%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  animation:rainbow 10s linear infinite;
}

/* VERIFIED */
.verify{
  color:#3b82f6;
  margin-left:5px;
}

/* PHONE */
.phone{
  color:#aaa;
  font-size:13px;
}

/* BUTTON */
.btn{
  display:block;
  margin-top:12px;
  padding:12px;
  border-radius:12px;
  text-align:center;
  text-decoration:none;
  font-weight:600;

  background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet);
  background-size:400%;
  animation:rainbow 8s linear infinite;

  color:#000;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="splash">
  <div class="logo">Trusted System</div>
</div>

<div id="app">

<header>Trusted List</header>

<div class="tabs">
  <button onclick="setTab('midman')" id="btnMid" class="active">Midman</button>
  <button onclick="setTab('seller')" id="btnSeller">Seller Trusted</button>
  <button onclick="setTab('scam')" id="btnScam">Scammer</button>
</div>

<div class="add" onclick="addData()">+ Tambah</div>

<div id="list"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 PASTE CONFIG SINI */
const firebaseConfig = {
  apiKey: "ISI",
  authDomain: "ISI",
  projectId: "ISI",
  storageBucket: "ISI",
  messagingSenderId: "ISI",
  appId: "ISI"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentTab="midman";
let allData=[];

/* INTRO */
setTimeout(()=>{
  splash.style.display="none";
  app.style.display="block";
},1500);

/* LOAD */
async function loadData(){
  const snap = await getDocs(collection(db,"data"));
  allData=[];
  snap.forEach(doc=> allData.push(doc.data()));
  render();
}

/* RENDER */
function render(){
  let html="";
  allData.forEach(d=>{
    if(d.type!==currentTab) return;

    html+=`
    <div class="card ${d.type}">
      <div class="name">
        ${d.nama}
        ${d.verified ? '<span class="verify">✔️</span>' : ''}
      </div>
      <div class="phone">${d.phone}</div>
      <a class="btn" href="https://wa.me/${d.phone}" target="_blank">WhatsApp</a>
    </div>`;
  });
  list.innerHTML=html;
}

/* ADD */
window.addData = async function(){
  let pass = prompt("Password:");
  if(pass!=="ipanzz") return alert("Salah");

  let nama = prompt("Nama:");
  let phone = prompt("Phone:");
  let type = prompt("Type (midman/seller/scam):");
  let verified = confirm("Verified?");

  await addDoc(collection(db,"data"),{
    nama, phone, type, verified
  });

  loadData();
}

/* TAB */
window.setTab=function(tab){
  currentTab=tab;

  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  if(tab==="midman") btnMid.classList.add("active");
  if(tab==="seller") btnSeller.classList.add("active");
  if(tab==="scam") btnScam.classList.add("active");

  render();
}

/* START */
loadData();

</script>

</body>
</html>
