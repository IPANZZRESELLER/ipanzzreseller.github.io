<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Midman Trusted</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
  overflow:hidden;
}

/* 🌌 BACKGROUND */
canvas{
  position:fixed;
  inset:0;
  z-index:-1;
}

/* 🔥 INTRO FIRST STYLE */
#splash{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.logo{
  font-size:30px;
  font-weight:bold;

  background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet,red);
  background-size:400%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  text-shadow:0 0 20px #fff,0 0 40px #00ffcc;

  animation:rainbowMove 4s linear infinite, zoomIn 1.5s ease;
}

@keyframes rainbowMove{
  0%{background-position:0%}
  100%{background-position:400%}
}

@keyframes zoomIn{
  0%{transform:scale(0.5);opacity:0}
  100%{transform:scale(1);opacity:1}
}

/* FADE OUT */
.hide{
  animation:fadeOut 0.8s forwards;
}

@keyframes fadeOut{
  to{opacity:0;visibility:hidden}
}

/* APP */
#app{
  display:none;
}

/* HEADER */
header{
  text-align:center;
  padding:15px;
  font-size:20px;

  background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet);
  background-size:400%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:rainbowMove 5s linear infinite;
}

/* TABS */
.tabs{
  display:flex;
  justify-content:center;
  gap:5px;
}

.tabs button{
  padding:8px 12px;
  border:none;
  border-radius:10px;
  background:#111;
  color:#aaa;
}

.active{
  background:#00ffcc;
  color:#000;
}

/* CARD */
.card{
  background:#111;
  margin:10px;
  padding:15px;
  border-radius:12px;
  box-shadow:0 0 10px #00ffcc33;
}

.name{
  font-weight:bold;
  font-size:16px;

  background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet);
  background-size:400%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:rainbowMove 5s linear infinite;
}

/* BUTTON */
.btn{
  display:block;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  text-align:center;
  text-decoration:none;
  font-weight:bold;
  color:#000;

  background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet);
  background-size:400%;
  animation:rainbowMove 4s linear infinite;

  box-shadow:0 0 15px #00ffcc;
}

/* MUSIC */
.music{
  position:fixed;
  top:10px;
  right:10px;
  background:#111;
  border:1px solid cyan;
  color:cyan;
  padding:8px;
  border-radius:10px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- 🔥 INTRO -->
<div id="splash">
  <div class="logo">Midman Trusted Malaysia</div>
</div>

<!-- APP -->
<div id="app">

<header>Midman Trusted Malaysia</header>

<button class="music" id="musicBtn">🎵</button>

<div class="tabs">
  <button id="btnMid" class="active">Midman</button>
  <button id="btnSeller">Seller</button>
  <button id="btnScam">Scam</button>
</div>

<div id="list"></div>

</div>

<audio id="bgm" loop>
  <source src="https://files.catbox.moe/3x0u8v.mp3">
</audio>

<script>

/* ELEMENT */
const splash = document.getElementById("splash");
const app = document.getElementById("app");
const list = document.getElementById("list");

const btnMid = document.getElementById("btnMid");
const btnSeller = document.getElementById("btnSeller");
const btnScam = document.getElementById("btnScam");

const musicBtn = document.getElementById("musicBtn");
const bgm = document.getElementById("bgm");

/* INTRO CONTROL */
setTimeout(()=>{
  splash.classList.add("hide");

  setTimeout(()=>{
    splash.style.display="none";
    app.style.display="block";
  },800);

},2000);

/* BACKGROUND */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = Array.from({length:100},()=>({
  x:Math.random()*canvas.width,
  y:Math.random()*canvas.height,
  s:Math.random()*2
}));

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#fff";

  stars.forEach(star=>{
    ctx.fillRect(star.x,star.y,star.s,star.s);
    star.y += star.s;
    if(star.y > canvas.height) star.y = 0;
  });

  requestAnimationFrame(animate);
}
animate();

/* DATA */
let data = [
  {nama:"MID IPANZZ", phone:"60175970694", type:"midman"},
  {nama:"SLRMYAPI", phone:"60104331830", type:"midman"},
  {nama:"SHOP ABC", phone:"60122222222", type:"seller"},
  {nama:"SCAMMER XYZ", phone:"60111111111", type:"scam"}
];

let currentTab = "midman";

/* RENDER */
function render(){
  let html="";
  data.forEach(d=>{
    if(d.type !== currentTab) return;

    html += `
    <div class="card">
      <div class="name">${d.nama}</div>
      <p>${d.phone}</p>
      <a class="btn" href="https://wa.me/${d.phone}" target="_blank">
        WhatsApp
      </a>
    </div>`;
  });

  list.innerHTML = html;
}

/* TAB */
btnMid.onclick = ()=>{currentTab="midman";setActive(btnMid);}
btnSeller.onclick = ()=>{currentTab="seller";setActive(btnSeller);}
btnScam.onclick = ()=>{currentTab="scam";setActive(btnScam);}

function setActive(btn){
  [btnMid,btnSeller,btnScam].forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  render();
}

/* MUSIC */
let musicOn=false;
musicBtn.onclick = ()=>{
  if(!musicOn){
    bgm.play().catch(()=>alert("Tekan lagi sekali"));
    musicOn=true;
  }else{
    bgm.pause();
    musicOn=false;
  }
};

/* START */
render();

</script>

</body>
</html>
