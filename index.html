<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>List Midman Trusted Malaysia</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f0f0f;
  color:#fff;
}

/* HEADER */
header{
  text-align:center;
  padding:25px 10px;
}

header h1{
  margin:0;
  font-size:20px;
}

header p{
  color:#888;
  font-size:13px;
}

/* CONTAINER */
.container{
  max-width:500px;
  margin:auto;
  padding:15px;
}

/* SEARCH */
input{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:none;
  background:#1a1a1a;
  color:#fff;
  margin-bottom:15px;
}

/* CARD */
.card{
  background:#1a1a1a;
  border-radius:10px;
  padding:15px;
  margin-bottom:10px;
}

/* TITLE */
.card h3{
  margin:0;
  font-size:16px;
}

/* STATUS */
.status{
  font-size:12px;
  color:#00ff99;
  margin-top:3px;
}

/* BUTTON */
.btn{
  display:block;
  margin-top:10px;
  padding:10px;
  border-radius:8px;
  text-align:center;
  text-decoration:none;
  background:#25D366;
  color:#fff;
  font-size:14px;
}

/* VERIFIED */
.badge{
  background:#00ff99;
  color:#000;
  font-size:10px;
  padding:3px 6px;
  border-radius:5px;
  margin-left:5px;
}
</style>
</head>

<body>

<header>
<h1>List Midman Trusted Malaysia</h1>
<p>Dikemaskini <span id="date"></span></p>
</header>

<div class="container">

<input id="search" placeholder="Cari nama midman...">

<div id="list">

  <div class="card">
    <h3>MID IPANZZ <span class="badge">VERIFIED</span></h3>
    <p>WhatsApp: 0175970694</p>
    <p class="status">Status: Trusted Malaysia</p>
    <a class="btn" href="https://wa.me/60175970694" target="_blank">WhatsApp</a>
  </div>

  <div class="card">
    <h3>SLRMYAPI</h3>
    <p>WhatsApp: 0104331830</p>
    <p class="status">Status: Trusted Malaysia</p>
    <a class="btn" href="https://wa.me/60104331830" target="_blank">WhatsApp</a>
  </div>

  <div class="card">
    <h3>MIDMAN AASHOP</h3>
    <p>WhatsApp: 0179981705</p>
    <p class="status">Status: Trusted Malaysia</p>
    <a class="btn" href="https://wa.me/60179981705" target="_blank">WhatsApp</a>
  </div>

</div>

</div>

<script>

/* DATE */
document.getElementById("date").innerText =
new Date().toLocaleDateString("ms-MY");

/* SEARCH */
document.getElementById("search").addEventListener("keyup", function(){
  let val = this.value.toLowerCase();
  document.querySelectorAll(".card").forEach(card=>{
    card.style.display =
    card.innerText.toLowerCase().includes(val) ? "" : "none";
  });
});

</script>

</body>
</html>
